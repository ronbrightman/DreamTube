<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>DreamTube — Your dreams come alive</title>
<meta name="description" content="Your dreams come alive. Turn your dreams into videos with DreamTube.">
<meta name="theme-color" content="#FBEFEA">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DreamTube">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/logo-v2.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  /* Welcome screen: page-scoped light "dawn" theme, matching the marketing
     funnel (start.html's Advanced/pricing screens, and the separate
     dreamtube-growth repo's funnel) that "Get Started" below hands off to.
     Founder feedback: this screen was black and clashed with that light
     pastel funnel one tap later. Token values are copied verbatim from
     start.html's #app.funnel-app --dawn-1/2/3 / --fn-* variables (search
     "--dawn-1" there) so the two screens match exactly. This is scoped to
     this one file only — css/styles.css's shared dark theme (--void,
     --bg-app, --text-primary, etc.) used by every other page is untouched. */
  :root{
    --dawn-1:#FBEFEA; --dawn-2:#E9EAF5; --dawn-3:#E3E9F7;
    --fn-ink:#3A3350; --fn-ink-soft:#6E6480;
    --fn-accent-grad:linear-gradient(135deg,#B0A8DC,#9FC6E8 55%,#F3C08C);
    --fn-font-display:Georgia,'Iowan Old Style','Palatino Linotype',serif;
  }
  body{ background:linear-gradient(160deg,var(--dawn-1),var(--dawn-2) 55%,var(--dawn-3)); }
  #app{ background:transparent; }
  /* Headline uses the funnel's serif display font (like .fn-headline in
     start.html); subline stays on the app's regular sans-serif body font
     (like .fn-body-copy), just recolored for the light background.
     Scoped under .welcome-body (not bare .wm-copy/.wm-subcopy) so this
     rule is always more specific than the base .wm-copy/.wm-subcopy
     rules in css/styles.css, regardless of <head> cascade order. */
  .welcome-body .wm-copy{ font-family:var(--fn-font-display); color:var(--fn-ink); }
  .welcome-body .wm-subcopy{ color:var(--fn-ink-soft); }
  /* logo-v2.png has an opaque black background baked into the PNG itself
     (it was designed for the old all-black theme). On this light dawn
     background that black rounded square would otherwise look like a
     broken leftover from the old theme, so it's framed as a deliberate
     "badge" — a light card behind it with generous padding and its own
     shadow, the same way an app icon keeps its own background color
     regardless of the home-screen wallpaper behind it. The image itself
     (size/border-radius) is untouched; only this wrapper is new. */
  .welcome-body .wm-badge{
    display:flex; align-items:center; justify-content:center;
    margin:18px auto; padding:24px;
    background:#FFFFFF; border-radius:48px;
    box-shadow:0 16px 40px -14px rgba(58,51,80,.32);
  }
  .welcome-body .wm-badge .wm-visual{ margin:0; }
  /* Matches the funnel's own .fn-btn-primary treatment exactly, so the
     button looks the same one tap before and one tap after this screen. */
  .welcome-body .btn-primary{ background:var(--fn-accent-grad); color:#fff; box-shadow:0 12px 26px -10px rgba(141,111,184,.5); }
  .welcome-body .btn-primary:hover{ filter:brightness(1.04); }
  .welcome-body .btn-primary:active{ filter:brightness(0.96); }
  .welcome-body .link-text{ color:var(--fn-ink-soft); }
</style>

<!-- Analytics: PostHog (product analytics + funnels + A/B experiments) and Meta Pixel
     (ad conversion tracking for Meta ads). Both blocks below no-op safely — no script
     load, no network call, no console error — until real keys are set in
     js/analytics-config.js. See docs/ANALYTICS_SETUP.md for the full setup story,
     including why GA4 is deliberately not installed yet (no Google Ads channel yet). -->
<script src="js/analytics-config.js"></script>

      api_host: POSTHOG_HOST,
      defaults: '2026-05-30',
      session_recording: {
        // PostHog already masks every input/textarea's typed value by default in session

        // sometimes vulnerable dream text people type into #dream-text and future

        maskAllInputs: true

</script>
<script>
  // Meta Pixel base code — https://developers.facebook.com/docs/meta-pixel/get-started
  // The <noscript> fallback pixel <img> from Meta's standard snippet is deliberately
  // left out: it can't be gated behind the same placeholder check (a <noscript> tag only
  // renders when JS is off, so no JS-side check can stop it firing with a placeholder ID),
  // and this app requires JavaScript to function at all (js/store.js is the entire
  // client-side "backend"), so a no-JS visitor already has a non-functional app either
  // way. Add it back once META_PIXEL_ID is a real value, if desired:
  //   <noscript><img height="1" width="1" style="display:none"
  //     src="https://www.facebook.com/tr?id=REAL_ID&ev=PageView&noscript=1" /></noscript>
  if (typeof META_PIXEL_ID !== 'undefined' && META_PIXEL_ID !== 'REPLACE_WITH_REAL_PIXEL_ID') {
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};

    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', META_PIXEL_ID);
    fbq('track', 'PageView');
  }
</script>
</head>
<body>

<div id="app">
  <div class="welcome-body">
    <div class="wm-badge"><img class="wm-visual" src="assets/logo-v2.png" alt="DreamTube logo"></div>
    <div class="wm-copy">Your dreams<br>come <i>alive.</i></div>
    <div class="wm-subcopy">Turn your dreams into videos.</div>
    <div class="wm-foot">
      <a class="btn btn-primary btn-block" href="https://dreamtubeapp.netlify.app/">Get Started</a>
      <span class="link-text">Already have an account? <a href="login.html" style="color:var(--fn-ink); text-decoration:underline;">Log in</a></span>
      <span class="link-text" style="display:block; margin-top:10px;"><a href="pricing.html" style="color:var(--fn-ink-soft); text-decoration:underline;">How it works &amp; pricing</a></span>
    </div>
  </div>
</div>

<script src="js/store.js"></script>
</body>
</html>
