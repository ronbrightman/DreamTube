<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>DreamTube</title>
<meta name="description" content="Turn your dreams into videos.">
<meta name="theme-color" content="#1C1A3D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DreamTube">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/jpeg" href="assets/logo.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">

<body>
<div class="ink-field" aria-hidden="true"><div class="ink-blob b1"></div><div class="ink-blob b2"></div></div>

<div id="app">
  <div class="welcome-body">
    <div class="wm-logo">DreamTube</div>
    <img class="wm-visual" src="assets/logo.jpeg" alt="DreamTube logo">
    <div class="wm-copy">Turn your dreams<br>into <i>videos.</i></div>
    <div class="wm-foot">
      <a class="btn btn-primary btn-block" href="login.html">Get Started</a>
      <span class="link-text">Already have an account? <a href="login.html" style="color:var(--accent); text-decoration:underline;">Log in</a></span>

  </div>

<script src="js/store.js"></script>
