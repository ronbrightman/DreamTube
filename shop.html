<body>

<div id="app">
  <div class="topbar">
    <a class="icon-btn" id="shop-back" href="profile.html"></a>
    <div class="topbar-logo" style="font-size:16px;">Token shop</div>
    <div style="width:36px;"></div>
  </div>

  <div class="px" style="flex:1; padding-bottom:30px;">
    <div class="token-balance-card">
      <div class="token-balance-amt" id="shop-balance">–</div>
      <div class="token-balance-sub">tokens available</div>
      <div class="token-balance-sub" id="shop-countdown"></div>
    </div>

    <div class="section-label" style="padding:0;">Packs</div>

    <!-- Neither pack has a real checkout yet — see the header comment in
         the script block below for why both buttons are deliberately
         disabled "Coming soon", not wired to any backend call. -->
    <div class="token-pack-card">
      <div class="token-pack-row">
        <div class="token-pack-amt">100 tokens</div>
        <div class="token-pack-price">$1.99</div>
      </div>
      <div class="token-pack-sub">Enough for 1 more generation.</div>
      <button class="btn btn-secondary btn-block" disabled>Coming soon</button>
    </div>

    <div class="token-pack-card">
      <div class="token-pack-badge">10% off</div>
      <div class="token-pack-row">
        <div class="token-pack-amt">500 tokens</div>
        <div class="token-pack-price">$8.95</div>
      </div>
      <div class="token-pack-sub">Enough for 5 more generations.</div>
      <button class="btn btn-secondary btn-block" disabled>Coming soon</button>
    </div>

    <div class="auth-sub" style="margin-top:8px;">You'll always get 100 free tokens every 24 hours, whether or not you buy a pack — see your balance above.</div>
  </div>
</div>

<script src="js/icons.js"></script>
<script src="js/store.js"></script>
<script>
  if(!DreamStore.getCurrentUser()){ location.href = 'login.html'; }
  document.getElementById('shop-back').innerHTML = Icons.back;

  // ============================================================================
  // Token packs — no payment processor is wired up yet (a vendor choice per
  // AGENT_POLICY.md's escalation policy, not something a build pass makes on
  // its own) so both buttons above are static and disabled. Do not wire a
  // real checkout call here without that human decision having happened
  // first — see start.html's proceedPastPricing() and the old
  // grant-topup-bonus.js (now deleted) for the same "flag, don't fake it"
  // rule this follows.
  //
  // Pricing (founder-specified): 100 tokens for $1.99, 500 tokens for
  // $8.95. The 500-pack price is a 10% discount off the naive 5x bundle
  // price (5 * $1.99 = $9.95 -> 10% off = $8.955), rounded DOWN to a clean
  // two-decimal price ($8.95) rather than the exact $8.955 — a deliberate
  // but arbitrary rounding choice, not a fixed one. Revisit/adjust freely;
  // it was never re-derived from a pricing model, just picked to look clean
  // on a price tag.
  // ============================================================================

  var balanceEl = document.getElementById('shop-balance');
  var countdownEl = document.getElementById('shop-countdown');
  var tokenStatus = null;

  /** "3h 12m" / "42m" / "now" from an epoch-ms nextGrantAt — same shape as profile.html/style.html/result.html/processing.html's own copy of this (no shared JS module in this codebase, see js/store.js's header comment). */
  function formatTokenCountdown(nextGrantAt){
    if(nextGrantAt == null) return '';
    var ms = nextGrantAt - Date.now();
    if(ms <= 0) return 'now';
    var totalMin = Math.ceil(ms / 60000);
    var h = Math.floor(totalMin / 60);
    var m = totalMin % 60;
    return h > 0 ? (h + 'h ' + m + 'm') : (m + 'm');
  }

  function renderBalance(){
    if(!tokenStatus) return;
    balanceEl.textContent = tokenStatus.balance;
    countdownEl.textContent = tokenStatus.nextGrantAt ? ('Next 100 free tokens in ' + formatTokenCountdown(tokenStatus.nextGrantAt)) : '';
  }
  function loadBalance(){
    DreamStore.getTokenStatus().then(function(status){
      tokenStatus = status;
      renderBalance();
    }).catch(function(){ balanceEl.textContent = '–'; countdownEl.textContent = ''; });
  }
  loadBalance();
  setInterval(renderBalance, 60000);
</script>
</body>
</html>
