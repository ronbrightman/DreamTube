<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Tracker — DreamTube</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/logo-v2.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app" class="scroll-shell">
  <div class="topbar">
    <a class="icon-btn" id="tracker-back" href="admin.html"></a>
    <div class="topbar-logo" style="font-size:16px;">Tracker</div>
    <div style="width:36px;"></div>
  </div>

  <div class="scroll-area">
    <div class="px" style="padding-bottom:24px;">
      <!-- Shown while the current account's email hasn't been confirmed as
           OWNER_EMAIL yet, and left showing (in place of the content below)
           if it never matches. Same client-side-UX-only pattern as
           admin.html — real enforcement is server-side in
           update-tracker-item.js, which independently re-checks the email
           on every write. get-tracker-items.js itself needs no auth (the
           item list isn't sensitive), so reads always succeed once the
           owner check below passes; nothing here depends on the read
           endpoint itself being gated. -->
      <div id="tracker-unauthorized" style="padding:60px 0; text-align:center; display:none;">
        <div class="icon" style="width:32px; height:32px; color:var(--text-faint); margin:0 auto 14px;" id="tracker-unauthorized-icon"></div>
        <div class="auth-sub" style="margin:0;">This page isn't available for your account.</div>
      </div>

      <div id="tracker-content" style="display:none;">
        <!-- Add-item form. Real server-side owner enforcement happens on
             add-tracker-item.js itself regardless of this page's own
             owner-gating above — same defense-in-depth as every other
             control on this page. Kept as its own container, never
             touched by render() below, so an unrelated done/priority/
             delete action elsewhere on the page can never wipe an
             in-progress draft here (see the cross-item-draft-wipe class
             of bug this codebase has hit before with a per-item free-text
             field; this form isn't per-item so that failure mode doesn't
             apply, but keeping it structurally separate is what makes
             that true). -->
        <form id="tracker-add-form" class="tracker-add-form">
          <div class="section-label" style="padding:0;">Add item</div>
          <select class="field" id="tracker-add-category" style="margin-bottom:8px;">
            <option value="task">Open Task</option>
            <option value="idea">Idea</option>
          </select>
          <input class="field" id="tracker-add-title" type="text" placeholder="Title" maxlength="200" style="margin-bottom:8px;">
          <textarea class="field" id="tracker-add-detail" placeholder="Detail" maxlength="4000" dir="auto" style="min-height:70px; margin-bottom:8px;"></textarea>
          <select class="field" id="tracker-add-priority" style="margin-bottom:8px;">
            <option value="high">High priority</option>
            <option value="medium" selected>Medium priority</option>
            <option value="low">Low priority</option>
          </select>
          <button type="submit" class="btn btn-primary btn-block" id="tracker-add-submit">Add item</button>
          <div class="err-text" id="tracker-add-error" style="display:none;"></div>
        </form>

        <div class="section-label" style="padding:0;">Open Tasks</div>
        <div id="tracker-tasks"></div>

        <div class="section-label" style="padding:0;">Ideas</div>
        <div id="tracker-ideas"></div>
      </div>
      <div class="err-text" id="tracker-error" style="margin-top:8px;"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script src="js/icons.js"></script>
<script src="js/store.js"></script>
<script>
  document.getElementById('tracker-back').innerHTML = Icons.back;
  document.getElementById('tracker-unauthorized-icon').innerHTML = Icons.lock;

  var user = DreamStore.getCurrentUser();
  if (!user) { location.href = 'login.html?next=tracker.html'; }

  var email = DreamStore.getAccountEmail();
  var unauthorizedEl = document.getElementById('tracker-unauthorized');
  var contentEl = document.getElementById('tracker-content');
  var errorEl = document.getElementById('tracker-error');
  var tasksEl = document.getElementById('tracker-tasks');
  var ideasEl = document.getElementById('tracker-ideas');

  document.getElementById('tracker-add-form').addEventListener('submit', function (e) { handleAddSubmit(e); });

  function esc(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function () { t.classList.remove('show'); }, 2200);
  }

  function showUnauthorized() {
    unauthorizedEl.style.display = 'block';
    contentEl.style.display = 'none';
  }

  // ===== State =====
  // The full item list as last known from the server, mutated optimistically
  // on every checkbox/priority change and reconciled (reverted + toasted) if
  // the write actually fails. `expandedIds`/`doneOpen` track which
  // <details> the user has open so a full re-render (needed every time the
  // done/priority grouping changes) doesn't collapse whatever they were
  // already looking at.
  var items = [];
  var expandedIds = {};
  var doneOpen = { task: false, idea: false };

  // Any comment text currently typed into an open textarea but not yet
  // saved, keyed by item id. render() rebuilds every item's HTML from
  // scratch (see itemHTML() below), which only knows about item.comment —
  // the last *saved* value — so without this, checking a done box or
  // clicking a priority button ANYWHERE on the page (including on the very
  // item whose comment is being drafted, per the bug report) would
  // silently wipe whatever unsaved note someone was mid-typing elsewhere.
  // captureDrafts() (below) snapshots the live DOM right before every
  // render() call; itemHTML() then prefers that snapshot over item.comment
  // when one exists. This is in-memory only — never sent to the server on
  // its own, just kept around so a render() triggered by something
  // unrelated doesn't destroy an in-progress draft.
  var unsavedComments = {};

  // Per-id monotonic request-sequence counters, one map per handler below.
  // handleDoneChange/handlePriorityChange/handleCommentSave all follow the
  // same optimistic-mutate -> render() -> postUpdate().catch(revert) shape,
  // and each is only ever guarded against *itself* firing twice for the same
  // id out of order, never across different ids -- so a fresh save/toggle
  // started on id X before an earlier in-flight save/toggle on that SAME id
  // X has resolved can otherwise have the OLDER request's failure-revert
  // apply after the NEWER request's success already landed, silently
  // reverting item.{comment,done,priority} to a stale pre-both-changes
  // value even though the newer change was actually persisted server-side
  // (this is what review flagged a third time on handleCommentSave; the
  // other two handlers have the identical unguarded shape, so they get the
  // same guard here rather than leaving a known-identical bug in place).
  // Each handler stashes `var mySeq = ++seqMap[id]` at request start, and
  // its .catch() checks `if (seqMap[id] !== mySeq) return;` before reverting
  // anything -- so a stale request's failure can only revert state if it's
  // still the most recently-started request for that id; a newer request
  // (success or failure) always has the final say.
  var commentSaveSeq = {};
  var doneChangeSeq = {};
  var priorityChangeSeq = {};

  // Per-id last known SERVER-CONFIRMED value for each field -- populated
  // from the initial get-tracker-items load, then kept in sync on every
  // successful postUpdate() (see each handler's .then below). This exists
  // to fix a chained-failure edge case review caught on top of the seqMap
  // guard above: the seqMap guard correctly stops an older *stale* failure
  // from clobbering a newer *successful* save (tested below), but if TWO
  // overlapping same-id requests both FAIL, the surviving (newer) request
  // is still the sequence holder and still runs its revert -- and reverting
  // to its own captured "previous" is wrong, because "previous" is just the
  // prior optimistic in-memory value (itself never confirmed by the server,
  // since the older request that set it also failed), not the actual
  // last-good server state. Reverting to {comment,done,priority}Confirmed[id]
  // instead means a revert can only ever land on a value the server has
  // actually acknowledged, no matter how many same-id requests are chained
  // and failing. See the "chained double-failure" tests below for the
  // concrete scenario this fixes.
  //
  // The write side needs the exact same seqMap guard as the revert side:
  // each handler's .then only updates {comment,done,priority}Confirmed[id]
  // if it's still the most recently-started request for that id (mirroring
  // the mySeq check its own .catch already does). Without that guard, an
  // OLDER same-id request that happens to SUCCEED after a NEWER same-id
  // request has already resolved would silently clobber the newer,
  // server-confirmed value with its own stale one -- invisibly, since a
  // successful .then never itself calls render(), so nothing looks wrong
  // until some later same-id failure reverts to the wrong value. See the
  // "stale older success" tests below for the concrete scenario this fixes.
  var commentConfirmed = {};
  var doneConfirmed = {};
  var priorityConfirmed = {};

  var PRIORITY_RANK = { high: 0, medium: 1, low: 2 };
  var PRIORITY_LABEL = { high: 'H', medium: 'M', low: 'L' };

  /**
   * Not-done first, then High -> Medium -> Low. Array.prototype.sort has
   * been spec-guaranteed stable since ES2019 (every engine this app
   * targets), so equal-priority items keep whatever relative order they
   * already had — ties never get shuffled between renders, only a real
   * done/priority change ever moves an item.
   */
  function sortItems(list) {
    return list.slice().sort(function (a, b) {
      return PRIORITY_RANK[a.priority] - PRIORITY_RANK[b.priority];
    });
  }

  function itemHTML(item) {
    var priButtons = ['high', 'medium', 'low'].map(function (p) {
      return '<button type="button" class="tracker-pri-btn' + (item.priority === p ? ' active' : '') +
        '" data-priority="' + p + '" aria-label="Set priority ' + p + '" aria-pressed="' + (item.priority === p) + '">' +
        PRIORITY_LABEL[p] + '</button>';
    }).join('');
    return '' +
      '<details class="tracker-item" data-id="' + esc(item.id) + '">' +
        '<summary class="tracker-item-summary">' +
          '<input type="checkbox" class="tracker-check"' + (item.done ? ' checked' : '') + ' aria-label="Mark done">' +
          '<span class="tracker-item-title" dir="auto">' + esc(item.title) + '</span>' +
          '<span class="tracker-pri-group" role="group" aria-label="Priority">' + priButtons + '</span>' +
          '<button type="button" class="tracker-delete-btn icon" aria-label="Delete item">' + Icons.trash + '</button>' +
          '<span class="icon tracker-chevron">' + Icons.chevronDown + '</span>' +
        '</summary>' +
        '<div class="tracker-item-detail" dir="auto">' + esc(item.detail) + '</div>' +
        '<div class="tracker-comment-row">' +
          '<textarea class="field tracker-comment-input" dir="auto" placeholder="Leave a note for whoever maintains this item...">' + esc(commentValueFor(item)) + '</textarea>' +
          '<button type="button" class="btn btn-secondary tracker-comment-save">Save comment</button>' +
        '</div>' +
      '</details>';
  }

  /** The value a just-rendered comment textarea should start with: an in-progress unsaved draft if one was captured, otherwise the last saved value. */
  function commentValueFor(item) {
    return Object.prototype.hasOwnProperty.call(unsavedComments, item.id) ? unsavedComments[item.id] : (item.comment || '');
  }

  /**
   * Snapshots the live DOM value of every currently-rendered comment
   * textarea into unsavedComments, keyed by item id, so the render() that's
   * about to happen doesn't wipe it (see unsavedComments' own comment
   * above). Must be called immediately before every render() — capturing
   * after render() would just read back what render() already wrote.
   *
   * excludeId skips one id entirely (used by handleCommentSave): the item
   * whose comment was just explicitly saved has its authoritative value
   * committed to item.comment already, so it needs no draft entry — and
   * deliberately NOT re-capturing it here is what stops a freshly-saved
   * comment from ever being mistaken for an still-unsaved draft on its next
   * render.
   */
  function captureDrafts(excludeId) {
    Array.prototype.forEach.call(document.querySelectorAll('.tracker-item'), function (el) {
      var id = el.dataset.id;
      if (id === excludeId) return;
      var input = el.querySelector('.tracker-comment-input');
      if (input) unsavedComments[id] = input.value;
    });
  }

  function sectionHTML(categoryKey) {
    var inCategory = items.filter(function (i) { return i.category === categoryKey; });
    var open = sortItems(inCategory.filter(function (i) { return !i.done; }));
    var done = sortItems(inCategory.filter(function (i) { return i.done; }));

    var html = open.length
      ? open.map(itemHTML).join('')
      : '<div class="tracker-empty">Nothing open here.</div>';

    if (done.length) {
      html += '<details class="tracker-done-details" data-category="' + categoryKey + '">' +
        '<summary class="tracker-done-summary">Done (' + done.length + ')</summary>' +
        '<div class="tracker-done-list">' + done.map(itemHTML).join('') + '</div>' +
      '</details>';
    }
    return html;
  }

  /** Wires a just-rendered container's checkbox/priority/expand-state behavior. Called after every render() since innerHTML replacement always needs fresh listeners. */
  function wireItems(containerEl) {
    Array.prototype.forEach.call(containerEl.querySelectorAll('.tracker-item'), function (el) {
      var id = el.dataset.id;

      el.open = !!expandedIds[id];
      el.addEventListener('toggle', function () { expandedIds[id] = el.open; });

      var checkbox = el.querySelector('.tracker-check');
      checkbox.addEventListener('click', function (e) { e.stopPropagation(); });
      checkbox.addEventListener('change', function () { handleDoneChange(id, checkbox.checked); });

      Array.prototype.forEach.call(el.querySelectorAll('.tracker-pri-btn'), function (btn) {
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          handlePriorityChange(id, btn.dataset.priority);
        });
      });

      var deleteBtn = el.querySelector('.tracker-delete-btn');
      deleteBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        handleDelete(id);
      });

      // Textarea + save button live inside the <summary>'s sibling content,
      // but a click anywhere inside an open <details> can still bubble up
      // to the <summary> and re-toggle it closed — same stopPropagation
      // discipline as the checkbox/priority buttons above.
      var commentInput = el.querySelector('.tracker-comment-input');
      commentInput.addEventListener('click', function (e) { e.stopPropagation(); });
      var commentSaveBtn = el.querySelector('.tracker-comment-save');
      commentSaveBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        handleCommentSave(id, commentInput.value);
      });
    });

    Array.prototype.forEach.call(containerEl.querySelectorAll('.tracker-done-details'), function (el) {
      var category = el.dataset.category;
      el.open = !!doneOpen[category];
      el.addEventListener('toggle', function () { doneOpen[category] = el.open; });
    });
  }

  function render() {
    tasksEl.innerHTML = sectionHTML('task');
    ideasEl.innerHTML = sectionHTML('idea');
    wireItems(tasksEl);
    wireItems(ideasEl);
  }

  function findItem(id) {
    for (var i = 0; i < items.length; i++) { if (items[i].id === id) return items[i]; }
    return null;
  }

  /** POSTs one field patch to update-tracker-item.js. Rejects on any non-2xx or network failure so callers can revert + toast. */
  function postUpdate(id, patch) {
    var body = Object.assign({ id: id, email: email }, patch);
    return fetch('/.netlify/functions/update-tracker-item', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(function (res) {
      if (!res.ok) throw new Error('update-tracker-item failed');
      return res.json();
    });
  }

  function handleDoneChange(id, newDone) {
    var item = findItem(id);
    if (!item) return;
    if (!doneChangeSeq[id]) doneChangeSeq[id] = 0;
    var mySeq = ++doneChangeSeq[id];
    item.done = newDone;
    captureDrafts();
    render();
    postUpdate(id, { done: newDone }).then(function () {
      // Only the most recently-started done-toggle for THIS id is allowed
      // to update the confirmed value -- mirrors the seq check in the
      // .catch below. Without this, an OLDER request that happens to
      // SUCCEED after a NEWER same-id request has already resolved would
      // unconditionally clobber doneConfirmed[id] with its own stale
      // value, even though nothing renders at that instant -- the
      // corruption only surfaces later, when some subsequent same-id
      // failure reverts to the wrong confirmed value.
      if (doneChangeSeq[id] === mySeq) doneConfirmed[id] = newDone;
    }).catch(function () {
      // Only the most recently-started done-toggle for THIS id is allowed
      // to revert -- see the seqMap block near unsavedComments for why.
      if (doneChangeSeq[id] !== mySeq) return;
      // Revert to the last SERVER-CONFIRMED value, not a captured "previous"
      // -- see the {comment,done,priority}Confirmed block near unsavedComments
      // for why a chained-failure case needs this instead of "previous".
      item.done = doneConfirmed[id];
      captureDrafts();
      render();
      showToast("Couldn't save — try again.");
    });
  }

  function handlePriorityChange(id, newPriority) {
    var item = findItem(id);
    if (!item || item.priority === newPriority) return;
    if (!priorityChangeSeq[id]) priorityChangeSeq[id] = 0;
    var mySeq = ++priorityChangeSeq[id];
    item.priority = newPriority;
    captureDrafts();
    render();
    postUpdate(id, { priority: newPriority }).then(function () {
      // Same seq guard as handleDoneChange's .then above, applied here --
      // see that comment for why an unguarded success handler can clobber
      // a newer, correct confirmed value with a stale older one.
      if (priorityChangeSeq[id] === mySeq) priorityConfirmed[id] = newPriority;
    }).catch(function () {
      // Only the most recently-started priority-change for THIS id is
      // allowed to revert -- see the seqMap block near unsavedComments.
      if (priorityChangeSeq[id] !== mySeq) return;
      // Revert to the last SERVER-CONFIRMED value -- see the *Confirmed
      // block near unsavedComments.
      item.priority = priorityConfirmed[id];
      captureDrafts();
      render();
      showToast("Couldn't save — try again.");
    });
  }

  /**
   * Same optimistic-update-with-toast-on-failure pattern as
   * handleDoneChange/handlePriorityChange above. Unlike those two, this
   * fires on an explicit "Save comment" click rather than on every
   * keystroke — the textarea's current value is only committed to `items`
   * (and re-rendered) when the founder actually clicks save. An empty
   * string is a normal, valid save (clearing a comment), not a no-op.
   */
  function handleCommentSave(id, newComment) {
    var item = findItem(id);
    if (!item || item.comment === newComment) return;
    // mySeq guards against a THIRD interleaving review caught on top of the
    // two below: double-submitting the SAME id (edit to X, save, edit
    // further to Y before X's request resolves, save again). The
    // item.comment === newComment check above only no-ops an exact repeat
    // click, not a further edit -- so without this, if the newer request
    // (Y) resolves and succeeds before the older one (X) resolves and
    // fails, X's .catch would revert item.comment past BOTH edits, silently
    // discarding the correctly-saved Y. See the seqMap block near
    // unsavedComments for the general shape (shared with
    // handleDoneChange/handlePriorityChange).
    if (!commentSaveSeq[id]) commentSaveSeq[id] = 0;
    var mySeq = ++commentSaveSeq[id];
    item.comment = newComment;
    // This id's value is now authoritative on item.comment itself -- drop
    // any stale draft entry for it so commentValueFor() renders from
    // item.comment, not a leftover snapshot (which would otherwise make a
    // just-saved comment look unsaved, or make a same-value re-save into a
    // silent no-op next time). excludeId on captureDrafts skips
    // re-capturing this id from the live DOM for the same reason.
    delete unsavedComments[id];
    captureDrafts(id);
    render();
    postUpdate(id, { comment: newComment }).then(function () {
      // Same seq guard as handleDoneChange's .then -- see that comment for
      // why an unguarded success handler can clobber a newer, correct
      // confirmed value with a stale older one.
      if (commentSaveSeq[id] === mySeq) commentConfirmed[id] = newComment;
    }).catch(function () {
      // Only the most recently-started save for this id may revert -- if a
      // newer save for the same id has started since this request went out,
      // that newer request (whatever it resolves to) has the final say, not
      // this stale one.
      if (commentSaveSeq[id] !== mySeq) return;
      // Revert to the last SERVER-CONFIRMED comment, not a captured
      // "previous" in-memory value. Matters when TWO overlapping same-id
      // saves both fail: the surviving (later-started) request is still the
      // one running this revert, but its own "previous" would only be the
      // OTHER in-flight request's optimistic (also-never-confirmed) edit --
      // reverting to that would show the browser a value the server never
      // actually stored. commentConfirmed[id] only ever changes on an
      // actual successful postUpdate, so it's always safe to revert to. See
      // the commentConfirmed/doneConfirmed/priorityConfirmed block near
      // unsavedComments, and the "chained double-failure" test below.
      item.comment = commentConfirmed[id];
      // On failure this id must revert to the confirmed saved value, not
      // whatever's still sitting in its live textarea (the just-rejected
      // edit) -- so it stays excluded here too, same as above. It also must
      // not display a STALE unsavedComments[id] entry: while this save was
      // in flight, an unrelated render() (triggered by another item's
      // done/priority toggle, or another item's own comment save) could
      // have run captureDrafts() and written this id's now-superseded live
      // textarea value back into the map. excludeId on captureDrafts only
      // stops US from re-capturing it here -- it doesn't clear whatever a
      // *different* render already wrote, so that has to be deleted
      // explicitly, exactly like the optimistic-save branch above does.
      delete unsavedComments[id];
      captureDrafts(id);
      render();
      showToast("Couldn't save — try again.");
    });
  }

  /** POSTs a new item to add-tracker-item.js. Rejects on any non-2xx or network failure, same contract as postUpdate. Resolves with the created item (server-generated id included) on success. */
  function postAdd(fields) {
    var body = Object.assign({ email: email }, fields);
    return fetch('/.netlify/functions/add-tracker-item', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(function (res) {
      if (!res.ok) throw new Error('add-tracker-item failed');
      return res.json();
    }).then(function (data) { return data.item; });
  }

  /** POSTs a delete to delete-tracker-item.js. Rejects on any non-2xx or network failure, same contract as postUpdate/postAdd. */
  function postDelete(id) {
    return fetch('/.netlify/functions/delete-tracker-item', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id, email: email })
    }).then(function (res) {
      if (!res.ok) throw new Error('delete-tracker-item failed');
      return res.json();
    });
  }

  /**
   * Submits the add-item form. Not optimistic the way priority/done/delete
   * are — there's no client-known id yet for a brand-new item (the server
   * generates it), so this waits for the real response before touching
   * `items`/render() at all, then clears the form on success. Failure
   * leaves the form's contents exactly as the user typed them (nothing to
   * revert — it was never added client-side in the first place) and shows
   * the same toast every other failure path uses.
   */
  function handleAddSubmit(e) {
    e.preventDefault();
    var addErrorEl = document.getElementById('tracker-add-error');
    addErrorEl.style.display = 'none';

    var categoryEl = document.getElementById('tracker-add-category');
    var titleEl = document.getElementById('tracker-add-title');
    var detailEl = document.getElementById('tracker-add-detail');
    var priorityEl = document.getElementById('tracker-add-priority');
    var submitBtn = document.getElementById('tracker-add-submit');

    var title = titleEl.value.trim();
    var detail = detailEl.value.trim();
    if (!title || !detail) {
      addErrorEl.textContent = 'Title and detail are both required.';
      addErrorEl.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    postAdd({
      category: categoryEl.value,
      title: title,
      detail: detail,
      priority: priorityEl.value
    }).then(function (created) {
      items.push(created);
      render();
      titleEl.value = '';
      detailEl.value = '';
      categoryEl.value = 'task';
      priorityEl.value = 'medium';
    }).catch(function () {
      showToast("Couldn't add — try again.");
    }).finally(function () {
      submitBtn.disabled = false;
    });
  }

  /**
   * Removes an item after a native confirm(), matching this codebase's
   * existing delete-confirmation pattern (see e.g. create.html/
   * result.html/start.html's "Delete this character?"). Optimistic:
   * removes from `items`/render() immediately, re-inserts on failure and
   * toasts — same revert-on-failure shape as handleDoneChange/
   * handlePriorityChange, just for a removal instead of a field patch.
   *
   * Reverts by id/reference, not by the array index captured before the
   * async round-trip: if another add/delete completes while this one is
   * still in flight, a captured index can point at the wrong position
   * (or no longer be this item's position at all) by the time the
   * revert runs. Filtering `items` by id on removal, and re-appending the
   * captured `removed` object on revert (only if it isn't already back
   * in the array — e.g. re-added by hand while this delete was still in
   * flight), sidesteps that entirely; render()'s own sortItems() puts it
   * back in the right priority/done group regardless of array position,
   * so the only thing an id-based revert can't preserve is exact tie
   * order among same-priority items, which is cosmetic only.
   */
  /**
   * Deletes one item optimistically, re-inserting it on failure. Calls
   * captureDrafts() before every render() here, same as
   * handleDoneChange/handlePriorityChange/handleCommentSave above — without
   * it, deleting (or failing to delete, then reverting) ANY item would
   * silently wipe in-progress unsaved comment drafts on every OTHER
   * currently-rendered item, the exact cross-item-draft-wipe bug class this
   * page already fixed once for the other three handlers.
   */
  function handleDelete(id) {
    var removed = findItem(id);
    if (!removed) return;
    if (!confirm('Delete this item?')) return;

    items = items.filter(function (i) { return i.id !== id; });
    captureDrafts();
    render();
    postDelete(id).catch(function () {
      if (!findItem(id)) items.push(removed);
      captureDrafts();
      render();
      showToast("Couldn't delete — try again.");
    });
  }

  if (!email) {
    // Logged in, but this account has no email on file at all — can never
    // match OWNER_EMAIL, so there's no point calling the function.
    showUnauthorized();
  } else {
    fetch('/.netlify/functions/admin-paywall-toggle?email=' + encodeURIComponent(email))
      .then(function (res) { return res.json(); })
      .then(function (state) {
        if (!state.isOwner) { showUnauthorized(); return; }
        contentEl.style.display = 'block';
        return fetch('/.netlify/functions/get-tracker-items')
          .then(function (res) { return res.json(); })
          .then(function (data) {
            items = data.items || [];
            // Seed the server-confirmed baseline for every field this page
            // can edit, so the very first optimistic edit on any item
            // already has a real confirmed value to fall back to on
            // failure (see the *Confirmed block near unsavedComments).
            items.forEach(function (item) {
              commentConfirmed[item.id] = item.comment || '';
              doneConfirmed[item.id] = item.done;
              priorityConfirmed[item.id] = item.priority;
            });
            render();
          })
          .catch(function () {
            errorEl.textContent = "Couldn't load the tracker — try refreshing.";
          });
      })
      .catch(function () {
        // Fails closed — same visible result as not being the owner,
        // rather than a broken half-rendered page.
        showUnauthorized();
      });
  }
</script>
</body>
</html>
