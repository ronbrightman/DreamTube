<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Home — DreamTube</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/logo-v2.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

<!-- Analytics: PostHog (product analytics + funnels + A/B experiments) and Meta Pixel

     load, no network call, no console error — until real keys are set in
     js/analytics-config.js. See docs/ANALYTICS_SETUP.md for the full setup story,
     including why GA4 is deliberately not installed yet (no Google Ads channel yet). -->
<script src="js/analytics-config.js"></script>
<script>

        // PostHog already masks every input/textarea's typed value by default in session

<script>
  // Meta Pixel base code — https://developers.facebook.com/docs/meta-pixel/get-started
  // The <noscript> fallback pixel <img> from Meta's standard snippet is deliberately
  // left out: it can't be gated behind the same placeholder check (a <noscript> tag only
  // renders when JS is off, so no JS-side check can stop it firing with a placeholder ID),
  // and this app requires JavaScript to function at all (js/store.js is the entire
  // client-side "backend"), so a no-JS visitor already has a non-functional app either
  // way. Add it back once META_PIXEL_ID is a real value, if desired:
  //   <noscript><img height="1" width="1" style="display:none"
  //     src="https://www.facebook.com/tr?id=REAL_ID&ev=PageView&noscript=1" /></noscript>
  if (typeof META_PIXEL_ID !== 'undefined' && META_PIXEL_ID !== 'REPLACE_WITH_REAL_PIXEL_ID') {
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;

    'https://connect.facebook.net/en_US/fbevents.js');

</script>
</head>
<body>

<div id="app" class="scroll-shell">
  <div class="topbar">
    <div class="topbar-logo" id="home-title">DreamTube</div>
    <input type="text" id="search-input" class="search-input" placeholder="Search dreams…" dir="auto" style="display:none;">
    <div class="icon-btn" id="search-toggle"></div>
  </div>
  <div class="scroll-area">
    <div class="gen-banner" id="gen-banner" style="display:none;">
      <div class="spinner-inline"></div>
      <div class="gen-banner-text">Your dream is still generating…</div>
    </div>
    <div class="section-label" style="padding:0 18px; margin-top:2px;">For you</div>
    <div class="home-feed" id="home-grid"></div>
  </div>
  <div class="bottom-nav">
    <a class="nav-item active" href="home.html"><div class="nav-icon icon"></div>Home</a>
    <a class="nav-create" href="create.html" title="Turn Your Dream Into a Video">+</a>
    <a class="nav-item" href="profile.html"><div class="nav-icon icon"></div>Profile</a>
  </div>
</div>

<script src="js/icons.js"></script>
<script src="js/store.js"></script>
<script>
  if(!DreamStore.getCurrentUser()){ location.href = 'login.html'; }

  document.getElementById('search-toggle').innerHTML = Icons.search;
  var navIcons = document.querySelectorAll('.nav-icon');
  navIcons[0].innerHTML = Icons.home;
  navIcons[1].innerHTML = Icons.person;

  function formatCount(n){ if(n>=1000) return (n/1000).toFixed(n%1000===0?0:1)+'k'; return String(n); }
  function esc(str){ var d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

  function cardHTML(d){
    var media = d.videoUrl
      ? '<video class="home-card-video" src="'+esc(d.videoUrl)+'" muted loop playsinline preload="metadata"></video>'
      : '<div class="home-card-video" style="background:'+DreamStore.gradientFor(d)+'"></div>';
    return '<a class="home-card" href="explore.html?id='+d.id+'">' +
      '<div class="home-card-art">'+media+'</div>' +
      '<div class="home-card-scrim"></div>' +
      '<div class="home-card-body">' +
        '<div><div class="home-card-user">'+esc(d.ownerHandle)+'</div><div class="home-card-cap" dir="auto">'+esc(d.caption)+'</div></div>' +
        '<div class="home-card-like"><span class="icon">'+Icons.heartFilled+'</span>'+formatCount(d.likes)+'</div>' +
      '</div>' +
    '</a>';
  }

  var searchToggle = document.getElementById('search-toggle');
  var searchInput = document.getElementById('search-input');
  var homeTitle = document.getElementById('home-title');
  var searchActive = false;

  // Fetched once from the real shared feed (see js/store.js's
  // getSharedFeed) and filtered client-side on every keystroke, rather than
  // re-fetching per keystroke.
  var allDreams = [];
  var feedLoaded = false;

  function renderGrid(){
    var grid = document.getElementById('home-grid');
    if(!feedLoaded){ grid.innerHTML = '<div class="grid-empty">Loading dreams…</div>'; return; }
    var q = searchInput.value.trim().toLowerCase();
    var dreams = allDreams;
    if(q){
      dreams = dreams.filter(function(d){
        return d.caption.toLowerCase().indexOf(q) !== -1 || d.ownerHandle.toLowerCase().indexOf(q) !== -1;
      });
    }
    grid.innerHTML = dreams.length
      ? dreams.map(cardHTML).join('')
      : q
        ? '<div class="grid-empty">No dreams match "'+esc(searchInput.value.trim())+'".</div>'
        : '<div class="grid-empty">No dreams here yet. Be the first to publish one.</div>';
  }
  renderGrid();

  function loadFeed(){
    DreamStore.getSharedFeed().then(function(dreams){
      allDreams = dreams;
      feedLoaded = true;
      renderGrid();
    }).catch(function(){
      feedLoaded = true;
      document.getElementById('home-grid').innerHTML = '<div class="grid-empty">Couldn\'t load the feed — check your connection and try again.</div>';
    });
  }
  loadFeed();

  searchToggle.addEventListener('click', function(){
    searchActive = !searchActive;
    homeTitle.style.display = searchActive ? 'none' : 'block';
    searchInput.style.display = searchActive ? 'block' : 'none';
    searchToggle.innerHTML = searchActive ? Icons.close : Icons.search;
    if(searchActive){
      searchInput.focus();
    } else {
      searchInput.value = '';
      renderGrid();
    }
  });
  searchInput.addEventListener('input', renderGrid);

  function fireNotification(dream){
    if('Notification' in window && Notification.permission === 'granted'){
      try{ new Notification('Your dream is ready!', { body: '"' + dream.caption + '" finished generating.', icon: 'assets/logo-v2.png' }); }catch(e){ /* notification unsupported/blocked — banner clearing is enough */ }
    }
  }

  var pending = DreamStore.getPendingJob();
  if(pending){
    var banner = document.getElementById('gen-banner');
    banner.style.display = 'flex';
    var shouldNotify = !!pending.notify;
    DreamStore.resumePendingJob().then(function(dream){
      banner.style.display = 'none';
      renderGrid();
      if(shouldNotify) fireNotification(dream);
    }).catch(function(){
      banner.style.display = 'none';
    });
  }
</script>
</body>
</html>
