<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Profile — DreamTube</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/jpeg" href="assets/logo.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app" class="scroll-shell">
  <div class="topbar">
    <div class="topbar-logo" style="font-size:16px;">Profile</div>
    <div class="icon-btn" id="logout-btn" title="Log out"></div>
  </div>
  <div class="scroll-area">
    <div class="profile-head">
      <div class="profile-avatar-ring"><div class="profile-avatar">🌙</div></div>
      <div class="profile-name" id="profile-handle">@you</div>
      <div class="profile-stats"><b id="stat-created">0</b> created · <b id="stat-shared">0</b> shared</div>
      <a class="btn btn-primary" href="create.html" style="margin-top:14px; padding:12px 22px;">+ Create dream</a>
    </div>
    <div id="profile-empty" class="grid-empty" style="display:none;">You haven't created a dream yet — tap "+ Create dream" to make your first one.</div>
    <div id="profile-lists">
      <div class="section-label" style="padding:0 20px;">Shared</div>
      <div class="video-grid" id="shared-grid"></div>
      <div class="section-label" style="padding:0 20px;">Private</div>
      <div class="video-grid" id="private-grid"></div>
    </div>
  </div>
  <div class="bottom-nav">
    <a class="nav-item" href="home.html"><div class="nav-icon icon"></div>Home</a>
    <a class="nav-create" href="create.html" title="Turn Your Dream Into a Video">+</a>
    <a class="nav-item active" href="profile.html"><div class="nav-icon icon"></div>Profile</a>
  </div>
</div>

<script src="js/icons.js"></script>
<script src="js/store.js"></script>
<script>
  if(!DreamStore.getCurrentUser()){ location.href = 'login.html'; }

  document.getElementById('logout-btn').innerHTML = Icons.settings;
  var navIcons = document.querySelectorAll('.nav-icon');
  navIcons[0].innerHTML = Icons.home;
  navIcons[1].innerHTML = Icons.person;

  function formatCount(n){ if(n>=1000) return (n/1000).toFixed(n%1000===0?0:1)+'k'; return String(n); }
  function esc(str){ var d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

  function vcardHTML(d){
    // No .priv badge here — Profile already splits into separate Shared/Private
    // sections, so a per-card badge would just repeat the section header.
    var media = d.videoUrl
      ? '<video class="vcard-video" src="'+esc(d.videoUrl)+'" muted loop playsinline preload="metadata"></video>'
      : '<div class="vcard-thumb-bg" style="background:'+DreamStore.gradientFor(d)+'"></div>';
    return '<a class="vcard" href="explore.html?id='+d.id+'">' +
      '<div class="vcard-thumb">'+media+
        '<button class="vcard-delete icon" data-delete="'+d.id+'" title="Delete">'+Icons.trash+'</button>' +
        '<div class="play-indicator icon">'+Icons.play+'</div><div class="dur">'+d.dur+'</div></div>' +
      '<div class="vcard-title" dir="auto">'+esc(d.caption)+'</div>' +
      '<div class="vcard-meta">'+d.ownerHandle+' · '+formatCount(d.likes)+' likes</div>' +
    '</a>';
  }

  var user = DreamStore.getCurrentUser();
  if(user) document.getElementById('profile-handle').textContent = user.handle;

  function render(){
    var mine = DreamStore.getMyDreams();
    var shared = mine.filter(function(d){ return d.isPublished; });
    var privateDreams = mine.filter(function(d){ return !d.isPublished; });

    document.getElementById('stat-created').textContent = mine.length;
    document.getElementById('stat-shared').textContent = shared.length;

    if(!mine.length){
      document.getElementById('profile-empty').style.display = 'block';
      document.getElementById('profile-lists').style.display = 'none';
    } else {
      document.getElementById('profile-empty').style.display = 'none';
      document.getElementById('profile-lists').style.display = 'block';
      document.getElementById('shared-grid').innerHTML = shared.length
        ? shared.map(vcardHTML).join('')
        : '<div class="grid-empty">Nothing shared yet — publish a dream from its result page.</div>';
      document.getElementById('private-grid').innerHTML = privateDreams.length
        ? privateDreams.map(vcardHTML).join('')
        : '<div class="grid-empty">No private dreams — everything you\'ve made is shared.</div>';
    }
  }
  render();

  // Delegated so re-rendering after a delete never needs to re-attach
  // per-card listeners. stopPropagation/preventDefault keep the click from
  // also triggering the enclosing <a class="vcard"> navigation.
  document.getElementById('profile-lists').addEventListener('click', function(e){
    var delBtn = e.target.closest('[data-delete]');
    if(!delBtn) return;
    e.preventDefault();
    e.stopPropagation();
    if(confirm('Delete this dream? This can\'t be undone.')){
      DreamStore.deleteDream(delBtn.dataset.delete);
      render();
    }
  });

  document.getElementById('logout-btn').addEventListener('click', function(){
    if(confirm('Log out of DreamTube?')){
      DreamStore.logout();
      location.href = 'index.html';
    }
  });
</script>
</body>
</html>
