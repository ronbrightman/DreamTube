<!--
  DreamTube onboarding funnel — originally 15 screens in one page, JS-driven
  step navigation, ported from the approved mockup at
  scratchpad/funnel-mockup.html (v3.1) — see that file and
  scratchpad/research/onboarding-funnel.md for the full original design
  rationale. Do not reorder or redesign the remaining screens here; this is
  an implementation of an already-approved spec, not a place to make new
  design calls.

  ARCHITECTURE SPLIT (see the dreamtube-growth repo's AGENT_POLICY.md for
  the full story): the ad-facing, iterate-often screens — hook carousel,
  the 3-question quiz, reassurance, social proof, dream-text capture, style
  picker, and the Dream Profile recap (formerly screens 1-8, 10, 12 in
  this file) have moved entirely to the separate dreamtube-growth
  marketing repo (https://dreamtubeapp.netlify.app/), with their own
  PostHog/Pixel/CAPI tracking and A/B testing. This file now only covers
  what structurally has to run in DreamTube's own origin: Advanced
  (characters/camera/scenery — formerly one screen 9, now split into three
  separate funnel screens, one per section — see below), the "coming
  together" transition (screen 11), signup, pricing, and confirmation
  (screens 13-15). Two reasons those couldn't move:
   1. Signup DOES make a network call now — DreamStore.signup() checks/
      creates the account server-side first (register-account.js, the
      authoritative cross-device uniqueness check), then mirrors it into
      this origin's own localStorage on success (falling back to a
      local-only write if the server can't be reached at all — see that
      function's own comment). The account still has to be created from
      THIS origin either way, since the local mirror it writes only exists
      here.
   2. Character photos are staged in-memory as base64 data URLs (the
      `staged` object below) until signup — arbitrarily large, and every
      other Advanced field (camera/scenery chips) writes directly into
      DreamStore.setDraft(), which only exists in this origin.

  Every visitor now arrives here from the marketing funnel, via
  ?resume=1 plus recall/types/motivations/style/caption as URL params —
  landing directly on Advanced, with those values hydrated into
  `quiz`/`chosenStyle`/the real draft first. A bare visit with no
  ?resume=1 (stale bookmark, old link) redirects straight back to the
  funnel — see the "Entry guard" block below. There is no organic
  in-app entry point into this file anymore; index.html's "Get Started"
  links to the marketing funnel directly.

  Real-integration notes still relevant to what's left here:
   - Advanced (characters/camera/scenery) is a real functional port of
     create.html's Advanced section, now split into three separate funnel
     screens — one per section (renderScreenAdvChars/AdvCamera/AdvScenery)
     — instead of the one crowded screen 9 used to be. Continue on each
     advances one step; Skip on any of the three jumps straight past all
     three, to the transition screen (goToStep(3)) — "skip" means "stop
     customizing", not "skip this one section". Camera/scenery chips call
     DreamStore.setDraft directly (login-independent). Characters are the
     one exception: DreamStore.saveCharacter() requires a logged-in user,
     but signup doesn't happen until screen 13 — by design, per the
     approved funnel order (dream input + Advanced moved early, paywall
     late). So characters are staged locally (the `staged` object) with the
     same validation rules as DreamStore.saveCharacter, and flushed into
     real DreamStore characters via flushStagedCharactersToStore() the
     moment signup succeeds on screen 13, before the funnel continues.
   - Screen 13 derives a username from the email's local part automatically
     (per the task spec — visitor never picks a username) and calls the
     real DreamStore.signup(username, password, email).
   - Screen 14 (pricing) has a deliberate, clearly-marked payment bypass —
     see the big comment above proceedPastPricing() below. There is no
     payment provider integrated yet; do not "finish" this without a human
     vendor decision (see AGENT_POLICY.md escalation policy).
   - Screen 15 hands off to the real, unmodified processing.html, which
     reads the now-fully-populated draft and starts real generation.
-->
</head>
<body>

<div id="app" class="funnel-app">
  <div class="fn-topbar">
    <button class="fn-back" id="fnBack" aria-label="Back" type="button"></button>
    <div class="fn-progress" id="fnProgress"></div>
    <div class="fn-topbar-spacer"></div>
  </div>
  <div class="fn-screen" id="fnScreen"></div>
</div>

<style>
  /* ===================================================================
     Funnel-specific styles. Every class here is prefixed "fn-", except
     the Advanced screens' character chips/add-tiles and character sheet
     (.char-chip/.char-chip-add/.sheet-overlay/.sheet/.char-mode-row/
     .char-mode-btn/.char-photo-*), which deliberately reuse create.html's
     real classes from css/styles.css verbatim (same markup, same click
     handlers, zero JS duplicated) rather than being reimplemented under
     fn- names. Since those classes are shared with create.html's own
     (dark-themed) Advanced accordion, every light-theme override for them
     below is scoped under "#app.funnel-app ..." so it can never reach
     create.html's plain "#app" — see each override for why.
     Colors/values ported from scratchpad/funnel-mockup.html. */

  #app.funnel-app{
    --dawn-1:#FBEFEA; --dawn-2:#E9EAF5; --dawn-3:#E3E9F7;
    --fn-ink:#3A3350; --fn-ink-soft:#6E6480; --fn-ink-faint:#9C93AC;
    --fn-card:#FFFFFF; --fn-line:rgba(58,51,80,0.10);
    --fn-accent-grad:linear-gradient(135deg,#B0A8DC,#9FC6E8 55%,#F3C08C);
    --fn-accent-solid:#7C82C4;
    --fn-font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Manrope,sans-serif;
    --fn-font-display:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    background:linear-gradient(160deg,var(--dawn-1),var(--dawn-2) 55%,var(--dawn-3));
    font-family:var(--fn-font-body);
    transition:background .4s ease;
  }
  #app.funnel-app.fn-phase-night .fn-btn-primary{ background:#fff; color:#221d2c; box-shadow:none;}

  .fn-topbar{ display:flex; align-items:center; gap:10px; padding:calc(env(safe-area-inset-top,0px) + 16px) 20px 4px; flex:none;}
  .fn-back{
    width:34px; height:34px; border-radius:50%; flex:none; cursor:pointer;
    background:var(--phase-card, var(--fn-card)); border:1px solid var(--phase-line, var(--fn-line));
    color:var(--phase-ink, var(--fn-ink)); display:flex; align-items:center; justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }
  .fn-back .icon, .fn-back svg{ width:15px; height:15px;}
  .fn-topbar-spacer{ width:34px; flex:none;}
  .fn-progress{ flex:1; display:flex; gap:4px;}
  .fn-progress i{ flex:1; height:3px; border-radius:3px; background:var(--phase-line, var(--fn-line)); display:block;}
  .fn-progress i.done{ background:var(--phase-ink, var(--fn-ink)); opacity:.55;}
  .fn-progress i.now{ background:var(--phase-ink, var(--fn-ink));}

  .fn-screen{ flex:1; display:flex; flex-direction:column; padding:18px 24px calc(24px + env(safe-area-inset-bottom,0px)); position:relative; overflow-y:auto; min-height:0; color:var(--phase-ink, var(--fn-ink));}

  .fn-eyebrow{ font-size:11px; font-weight:800; letter-spacing:.09em; text-transform:uppercase; color:var(--phase-faint, var(--fn-ink-faint)); margin-bottom:10px;}
  .fn-headline{ font-family:var(--fn-font-display); font-size:25px; font-weight:600; letter-spacing:-0.005em; line-height:1.25; text-wrap:balance; margin-bottom:10px; color:var(--phase-ink, var(--fn-ink));}
  .fn-body-copy{ font-size:14.5px; color:var(--phase-soft, var(--fn-ink-soft)); line-height:1.55; margin-bottom:18px;}
  .fn-mini-label{ font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--phase-faint, var(--fn-ink-faint)); margin:14px 0 8px;}
  .fn-mini-label:first-child{ margin-top:0;}
  .fn-spacer{ flex:1;}

  .fn-chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;}
  .fn-chip{ padding:9px 15px; border-radius:100px; background:var(--phase-card, var(--fn-card)); border:1px solid var(--phase-line, var(--fn-line)); font-size:13px; font-weight:700; color:#2C2846; cursor:pointer; -webkit-tap-highlight-color:transparent;}
  .fn-chip.sel{ background:var(--fn-accent-grad); color:#fff; border-color:transparent;}

  /* ----- Advanced/characters: shared create.html classes, light-themed
     overrides scoped to the funnel only (see the file-level comment
     above this <style> block for why these aren't fn- classes). ----- */
  #app.funnel-app .char-chip{ background:var(--phase-card, var(--fn-card)); border-color:var(--phase-line, var(--fn-line)); color:#2C2846;}
  #app.funnel-app .char-chip .chip-check{ border-color:var(--phase-faint, var(--fn-ink-faint));}
  #app.funnel-app .char-chip.selected{ background:var(--fn-accent-grad); color:#fff; border-color:transparent;}
  #app.funnel-app .char-chip.selected .chip-check{ background:#fff; border-color:#fff;}
  #app.funnel-app .char-chip.selected .chip-check .icon{ opacity:1; color:var(--fn-accent-solid);}
  #app.funnel-app .char-chip .chip-edit{ color:var(--phase-faint, var(--fn-ink-faint));}
  #app.funnel-app .char-chip.selected .chip-edit{ color:#fff; opacity:.75;}
  #app.funnel-app .char-chip-add{ background:transparent; border:1px dashed var(--phase-line, var(--fn-line)); color:var(--phase-soft, var(--fn-ink-soft));}
  #app.funnel-app .char-chip-add:hover{ border-color:var(--fn-accent-solid); color:var(--phase-ink, var(--fn-ink));}

  /* Character add/edit sheet — light card over the now-light Advanced
     screens, instead of create.html's dark bottom sheet. */
  #app.funnel-app .sheet{ background:var(--fn-card); color:#2C2846; border-top-color:var(--fn-line); box-shadow:0 -20px 50px rgba(58,51,80,.18);}
  #app.funnel-app .sheet-handle{ background:var(--fn-line);}
  #app.funnel-app .sheet-title{ color:#2C2846;}
  #app.funnel-app .char-mode-row .char-mode-btn{ background:#F3F1FA; border-color:var(--fn-line); color:var(--fn-ink-soft);}
  #app.funnel-app .char-mode-row .char-mode-btn.active{ background:var(--fn-accent-grad); color:#fff; border-color:transparent;}
  #app.funnel-app .char-photo-preview{ background:#F3F1FA; border-color:var(--fn-line);}
  #app.funnel-app .char-photo-empty{ color:var(--fn-ink-faint);}
  #app.funnel-app .char-photo-hint{ color:var(--fn-ink-soft);}
  #app.funnel-app .btn-secondary{ background:transparent; border:1px solid var(--fn-line); color:var(--fn-ink);}
  #app.funnel-app .btn-secondary:hover{ background:#F3F1FA; border-color:var(--fn-ink-faint);}

  textarea.fn-field, input.fn-field{ background:var(--phase-card, var(--fn-card)); border:1px solid var(--phase-line, var(--fn-line)); border-radius:16px; padding:14px 15px; font-family:var(--fn-font-body); color:#2C2846; font-size:15px; width:100%; margin-bottom:12px; display:block;}
  textarea.fn-field{ resize:none; line-height:1.5;}
  textarea.fn-field::placeholder, input.fn-field::placeholder{ color:var(--fn-ink-faint);}
  textarea.fn-field:focus, input.fn-field:focus{ outline:2px solid var(--fn-accent-solid); border-color:transparent;}

  .fn-field-pw-wrap{ position:relative; margin-bottom:12px;}
  .fn-field-pw-wrap .fn-field{ margin-bottom:0; padding-right:46px;}
  .fn-field-pw-toggle{ position:absolute; right:4px; top:0; bottom:0; width:38px; background:none; border:none; color:var(--fn-ink-faint); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .fn-field-pw-toggle svg, .fn-field-pw-toggle .icon{ width:18px; height:18px;}

  .fn-err-text{ font-size:12.5px; color:#C4485B; min-height:16px; margin:2px 0 8px;}

  /* SMS consent checkbox row (identity/retention project, screen 13 only —
     see docs/IDENTITY_RETENTION_PROJECT_SPEC.md Section 1.1). Unchecked by
     default in the markup itself below; this is purely visual. */
  .fn-consent-row{ display:flex; align-items:flex-start; gap:10px; font-size:11.5px; color:var(--fn-ink-faint); line-height:1.45; margin:2px 0 14px; cursor:pointer;}
  .fn-consent-row input[type="checkbox"]{ margin-top:2px; width:16px; height:16px; flex:none; accent-color:var(--fn-accent-solid);}

  .fn-btn-primary{ background:var(--fn-accent-grad); color:#fff; font-weight:800; font-size:15.5px; border:none; border-radius:100px; padding:15px; text-align:center; width:100%; box-shadow:0 12px 26px -10px rgba(141,111,184,.5); cursor:pointer; font-family:var(--fn-font-body); -webkit-tap-highlight-color:transparent;}
  .fn-btn-primary:disabled{ opacity:.42; cursor:not-allowed; box-shadow:none;}
  .fn-small-link{ background:none; border:none; color:var(--phase-soft, var(--fn-ink-soft)); font-size:12.5px; font-weight:700; text-decoration:underline; text-underline-offset:2px; text-align:center; width:100%; padding:10px 0 0; cursor:pointer;}

  .fn-proof-strip{ display:flex; align-items:center; gap:9px; padding:11px 13px; border-radius:100px; background:#fff; border:1px solid rgba(58,51,80,0.1); margin-bottom:16px;}
  .fn-proof-strip .avatars{ display:flex;}
  .fn-proof-strip .avatars i{ width:23px; height:23px; border-radius:50%; background:var(--fn-accent-grad); border:2px solid #fff; margin-left:-9px; display:block;}
  .fn-proof-strip .avatars i:first-child{ margin-left:0;}
  .fn-proof-strip span{ font-size:11.5px; font-weight:700; color:#6E6480;}

  .fn-price-note{ font-size:12px; color:#6E6480; text-align:center; margin:2px 0 0;}

  /* Screen 14's token-pricing display — replaces a small text-note-only
     treatment (found unclear enough that the founder asked for pricing
     to be genuinely clear here, not just mentioned) with the same visual
     weight the old Monthly/Yearly subscription cards used to get, so
     pricing reads as a real, considered part of the screen rather than a
     footnote. See renderScreen14 below for the markup this styles. */
  .fn-token-free-card{ background:#fff; border-radius:16px; padding:14px 16px; margin-bottom:12px; border:1.5px solid var(--fn-accent-solid);}
  .fn-token-free-card .title{ font-weight:800; font-size:14px; color:var(--fn-ink); margin-bottom:4px;}
  .fn-token-free-card .body{ font-size:13px; color:var(--fn-ink-soft); line-height:1.5;}
  .fn-token-free-card .body b{ color:var(--fn-ink); font-weight:700;}

  .fn-pack-row{ display:flex; gap:9px; margin-bottom:10px;}
  .fn-pack-card{ flex:1; background:#fff; border-radius:14px; padding:11px; text-align:center; position:relative; border:1px solid rgba(58,51,80,0.1);}
  .fn-pack-badge{ position:absolute; top:-8px; right:9px; background:var(--fn-accent-grad); color:#fff; font-size:9.5px; font-weight:800; padding:3px 8px; border-radius:100px;}
  .fn-pack-amt{ font-weight:700; font-size:13px; color:var(--fn-ink);}
  .fn-pack-price{ font-weight:800; font-size:17px; color:var(--fn-ink); margin-top:1px;}

  .fn-value-card{ background:#fff; border-radius:16px; padding:13px 15px 9px; margin-bottom:14px; border:1px solid rgba(58,51,80,0.1);}
  .fn-value-item{ display:flex; align-items:flex-start; gap:9px; font-size:13px; font-weight:600; color:#3A3350; padding-bottom:9px;}
  .fn-value-item .icon{ width:14px; height:14px; flex:none; margin-top:2px; color:var(--fn-accent-solid);}
  .fn-value-foot{ font-size:11.5px; color:var(--phase-soft, var(--fn-ink-soft)); margin-bottom:12px; line-height:1.6;}

  .fn-check-badge{ width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,.12); border:1.5px solid #fff; display:flex; align-items:center; justify-content:center; font-size:30px; margin:0 auto 18px; color:#fff;}

  .fn-spin{ width:48px; height:48px; border-radius:50%; border:3px solid var(--phase-line, var(--fn-line)); border-top-color:var(--fn-accent-solid); margin:0 auto 20px; animation:fnspin 1s linear infinite;}
  @keyframes fnspin{ to{ transform:rotate(360deg);} }
  @media (prefers-reduced-motion: reduce){ .fn-spin{ animation:none;} }
  .fn-loading-line{ font-size:13px; color:var(--phase-soft, var(--fn-ink-soft)); text-align:center; margin-bottom:6px;}
</style>

<script src="js/icons.js"></script>
<script src="js/store.js"></script>
<script>
(function(){
  'use strict';

  // ===== Analytics helper — guarded the same way every other page in this
  // app checks for a real PostHog key (see js/analytics-config.js). =====
  function track(name, props){
    if(window.posthog && typeof window.posthog.capture === 'function'){
      try{ posthog.capture(name, props || {}); }catch(e){ /* analytics must never break the funnel */ }
    }
  }

  function esc(str){ var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
  function getParam(name){ return new URLSearchParams(location.search).get(name); }

  // ===== Real social-proof count for screen 14 (pricing) =====
  // Replaces a hardcoded "12,400+ dreams brought to life this month" with
  // an actual count, computed client-side from the same real shared feed
  // Explore uses (DreamStore.getSharedFeed -> get-feed.js -> Blobs), since
  // there's no dedicated "dreams this month" endpoint. Kicked off here, at
  // script load, rather than when screen 14 first renders, so the fetch has
  // the whole rest of the funnel (screens 9, 11, 13) to resolve before
  // anyone actually reaches pricing. Stays null (and the proof strip is
  // omitted entirely, never a fake number) if the fetch hasn't resolved in
  // time or fails outright.
  var dreamsThisMonthCount = null;
  DreamStore.getSharedFeed().then(function(feed){
    var now = new Date();
    var y = now.getUTCFullYear(), m = now.getUTCMonth();
    dreamsThisMonthCount = feed.filter(function(d){
      if(!d.publishedAt) return false;
      var pd = new Date(d.publishedAt);
      return pd.getUTCFullYear() === y && pd.getUTCMonth() === m;
    }).length;
  }).catch(function(){ /* leave dreamsThisMonthCount null -> proof strip omitted */ });

  /**
   * Downscales/recompresses a picked photo to a JPEG data URL — copied
   * verbatim from create.html's identical helper (same reasons apply: an
   * unmodified phone photo can blow both localStorage's quota and the
   * generate-video request body cap).
   */
  function resizeImageFile(file, maxDim, quality){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onerror = function(){ reject(new Error('read_failed')); };
      reader.onload = function(){
        var img = new Image();
        img.onerror = function(){ reject(new Error('decode_failed')); };
        img.onload = function(){
          var scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          var w = Math.round(img.width * scale);
          var h = Math.round(img.height * scale);
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  /** Mirrors DreamStore.saveCharacter's validation/upsert rules exactly, against the local staging array instead of the real store. */
  function localSaveCharacter(patch){
    var name = (patch.name || '').trim();
    var description = (patch.description || '').trim();
    var isSelf = !!patch.isSelf;
    var photoDataUrl = (isSelf && patch.photoDataUrl) ? patch.photoDataUrl : null;
    if(!isSelf && !name) return { ok:false, error:'Give this character a name.' };
    if(!description && !photoDataUrl) return { ok:false, error: isSelf ? 'Add a description or a photo.' : 'Add a short description.' };
    var existing = patch.id ? staged.characters.filter(function(c){ return c.id === patch.id; })[0] : null;
    if(!existing && isSelf) existing = staged.characters.filter(function(c){ return c.isSelf; })[0] || null;
    if(existing){
      existing.name = name;
      existing.description = description;
      if(isSelf) existing.photoDataUrl = photoDataUrl; else delete existing.photoDataUrl;
      return { ok:true, character: existing };
    }
    var character = { id: 'local' + Math.random().toString(36).slice(2, 9), name: name, isSelf: isSelf, description: description };
    if(isSelf && photoDataUrl) character.photoDataUrl = photoDataUrl;
    staged.characters.push(character);
    return { ok:true, character: character };
  }
  function localDeleteCharacter(id){
    var before = staged.characters.length;
    staged.characters = staged.characters.filter(function(c){ return c.id !== id; });
    staged.selectedIds = staged.selectedIds.filter(function(x){ return x !== id; });
    return staged.characters.length !== before;
  }

    });

  }

  // Screen 13 — Email capture. Username is derived automatically from the
  // email's local part (never asked of the visitor) per the task spec.
  // ===================================================================
  function deriveUsernameBase(email){
    var local = (email.split('@')[0] || '').toLowerCase();
    var sanitized = local.replace(/[^a-z0-9]/g, '');
    if(sanitized.length < 3) sanitized = (sanitized + 'dreamer').slice(0, Math.max(3, sanitized.length + 4));
    return sanitized.slice(0, 20) || 'dreamer';
  }
  function attemptSignup(email, password, cb, phone, phoneConsent){
    var base = deriveUsernameBase(email);
    var attempts = 0;
    var MAX_ATTEMPTS = 8;
    // DreamStore.signup is now a real network round trip (server-side
    // account check, see js/store.js) — this loop is unchanged in shape,
    // just chained through the returned Promise instead of a synchronous
    // return, so a "username taken" collision (now possibly discovered on
    // the SERVER, from a signup on a different device, not just this
    // browser's local storage) still retries with a new suffix exactly as
    // before.
    function tryUsername(username){
      DreamStore.signup(username, password, email, phone, phoneConsent).then(function(result){
        if(result.ok){
          // Shared event_id pairs this with the Pixel's own
          // CompleteRegistration call — see js/analytics-config.js's
          // fireMetaConversion for why. login.html's own ?mode=signup path
          // fires the equivalent call for its own signup case.
          fireMetaConversion('CompleteRegistration', { email: email });
          cb(true, null); return;
        }
        if(result.error === 'That username is already taken.' && attempts < MAX_ATTEMPTS){
          attempts++;
          var suffix = Math.floor(1000 + Math.random() * 9000);
          tryUsername(base + suffix);
          return;
        }
        cb(false, result.error);
      });
    }
    tryUsername(base);
  }

      // docs/IDENTITY_RETENTION_PROJECT_SPEC.md Section 1.1). Both
      // entirely optional -- never required to complete signup. This is
      // the paid-traffic entry point the whole project is built around
      // (see that spec's Section 0), so it gets the same capture the
      // login.html signup form has.
      '<input class="fn-field" id="fn-phone" type="tel" placeholder="Phone number (optional)" autocomplete="tel" dir="auto">' +
      '<label class="fn-consent-row" id="fn-sms-consent-row">' +
        '<input type="checkbox" id="fn-sms-consent-checkbox">' +
        '<span>By checking this box, you agree to receive automated text messages from DreamTube, including a reminder about your dream the day after signup. Msg &amp; data rates may apply. Consent is not required to use DreamTube. Reply STOP at any time to opt out.</span>' +
      '</label>' +
      '<div class="fn-err-text" id="fn-signup-error"></div>' +
      '<button class="fn-btn-primary" id="fn-s13-continue" type="button" style="margin-bottom:12px;">Continue</button>' +
      '<div class="fn-spacer"></div>';

    var pwToggle = document.getElementById('fn-pw-toggle');
    var pwInput = document.getElementById('fn-password');
    pwToggle.innerHTML = Icons.eye;
    pwToggle.addEventListener('click', function(){
      var showing = pwInput.type === 'text';
      pwInput.type = showing ? 'password' : 'text';
      pwToggle.innerHTML = showing ? Icons.eye : Icons.eyeOff;
      pwToggle.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    });

    var continueBtn = document.getElementById('fn-s13-continue');
    var errEl = document.getElementById('fn-signup-error');
    continueBtn.addEventListener('click', function(){
      var email = document.getElementById('fn-email').value.trim();
      var password = pwInput.value;
      var phone = document.getElementById('fn-phone').value.trim();
      var phoneConsent = document.getElementById('fn-sms-consent-checkbox').checked;
      errEl.textContent = '';
      if(!email){ errEl.textContent = 'Enter your email address.'; return; }
      if(!password){ errEl.textContent = 'Enter a password.'; return; }
      continueBtn.disabled = true;
      continueBtn.textContent = 'Creating your account…';
      // Yields to a frame so the disabled/label state above actually paints
      // before attemptSignup kicks off its real network round trip (see
      // that function's own comment — signup is no longer instant/
      // local-only) — same 0ms-defer trick as login.html's own signup path,
      // used here instead of login.html's setTimeout(...,450) since there's
      // no artificial minimum-delay to simulate on top of the real network
      // latency this now already has.
      setTimeout(function(){
        attemptSignup(email, password, function(ok, err){
          if(!ok){
            continueBtn.disabled = false;
            continueBtn.textContent = 'Continue';
            errEl.textContent = err;
            return;
          }
          flushStagedCharactersToStore();
          next();
        }, phone, phoneConsent);
      }, 0);
    });
  }

  // ===================================================================
  // Screen 14 — Token intro (formerly Pricing / paywall)
  // ===================================================================
  // DreamTube's launch monetization model is consumption-based tokens, not
  // subscriptions — see netlify/functions/lib/entitlements.js's big doc
  // block for the full model. There is no plan to choose here anymore (no
  // Yearly/Monthly cards, no MOTIVATION_PLAN recommendation, no
  // "Continue to payment") — every visitor gets the same free starting
  // balance (200 tokens on signup, +100 every 24h automatically, see
  // getTokenStatus), so this screen is now a plain, honest acknowledgment/
  // continue step, not a paywall to get past. shop.html (linked from
  // profile.html once signed in) is where token packs will eventually be
  // purchased — "Coming soon" until a payment processor is chosen (see
  // AGENT_POLICY.md's escalation policy).
  var MOTIVATION_HEADLINES = {
    'Capture dreams before they fade': 'Never lose a dream again.',
    'Turn them into videos': 'See your dreams, not just remember them.',
    'Process a recurring dream': 'Finally make sense of the dream that keeps coming back.',
    'Keep them forever': 'Every dream, kept forever.',
    'Watch dreams of other people': "Yours — and everyone else's — waiting to be seen.",
    'Share with friends': 'Dreams worth sharing.'
  };
  function renderScreen14(el){
    var primaryMotivation = quiz.motivations[0] || null;
    var headline = (primaryMotivation && MOTIVATION_HEADLINES[primaryMotivation]) || 'Never lose a dream again.';

    el.innerHTML =
      '<div class="fn-eyebrow">Built around: ' + esc(primaryMotivation || 'your dreams') + '</div>' +
      '<div class="fn-headline" style="font-size:21px;">' + esc(headline) + '</div>' +
      (dreamsThisMonthCount !== null ?
        '<div class="fn-proof-strip"><span class="avatars"><i></i><i></i><i></i></span><span>' + dreamsThisMonthCount.toLocaleString() + (dreamsThisMonthCount === 1 ? ' dream' : ' dreams') + ' brought to life this month</span></div>' :
        '') +
      // Real, current capabilities only — no invented generation-count
      // limits, since there's no live usage cap yet (see AGENT_POLICY.md /
      // task spec: describe what DreamTube actually does today).
      '<div class="fn-value-card">' +
        '<div class="fn-value-item"><span class="icon">' + Icons.check + '</span><span>Turn your dream descriptions into AI-generated videos</span></div>' +
        '<div class="fn-value-item"><span class="icon">' + Icons.check + '</span><span>Personalize with your own style and characters</span></div>' +
        '<div class="fn-value-item"><span class="icon">' + Icons.check + '</span><span>Save your dreams and publish them to Explore</span></div>' +
      '</div>' +
      '<div class="fn-token-free-card">' +
        '<div class="title">Free to start</div>' +
        '<div class="body">' +
          '<b>200 tokens</b> when you sign up, plus <b>100 more free every day</b> — no card needed. Each dream video costs <b>100 tokens</b>, whether it\'s a new one, an edit, or a redo.' +
        '</div>' +
      '</div>' +
      '<div class="fn-pack-row">' +
        '<div class="fn-pack-card">' +
          '<div class="fn-pack-amt">100 tokens</div>' +
          '<div class="fn-pack-price">$1.99</div>' +
        '</div>' +
        '<div class="fn-pack-card">' +
          '<div class="fn-pack-badge">10% off</div>' +
          '<div class="fn-pack-amt">500 tokens</div>' +
          '<div class="fn-pack-price">$8.95</div>' +
        '</div>' +
      '</div>' +
      '<div class="fn-value-foot">' +
        '<div>Need more later? Token packs above — coming soon.</div>' +
      '</div>' +
      '<div class="fn-spacer"></div>' +
      '<button class="fn-btn-primary" id="fn-s14-continue" type="button">Continue</button>';

    document.getElementById('fn-s14-continue').addEventListener('click', proceedPastPricing);
  }

  // This screen used to be a real (if bypassed) paywall — see this file's
  // git history for the old proceedPastPricing() doc comment. There is
  // nothing left to bypass now: every token a visitor can spend today is
  // free-earned (see the doc block above renderScreen14), so this is just
  // the screen's "acknowledge and continue" action, kept as its own named
  // function (rather than inlined into the click listener) purely so the
  // tracking call below has one obvious home.
  function proceedPastPricing(){
    // Renamed from the old funnel_pricing_bypassed (there's no plan to
    // record anymore, and "bypassed" implied skipping a real paywall,
    // which this screen no longer is).
    track('funnel_token_intro_continued', { step: 14 });
    next();
  }

  // ===================================================================
  // Screen 15 — Confirmation, then real handoff to processing.html
  // ===================================================================
  function renderScreen15(el){
    el.innerHTML =
      '<div class="fn-spacer"></div>' +
      '<div class="fn-check-badge">&#10003;</div>' +
      '<div class="fn-headline" style="text-align:center; color:#fff; font-size:23px;">' + "You're in. Building your first dream now." + '</div>' +
      '<div class="fn-body-copy" style="text-align:center; color:rgba(255,255,255,.7);">This is DreamTube — quiet and dark, like the room you just woke up in.</div>' +
      '<div class="fn-spacer"></div>' +
      '<button class="fn-btn-primary" id="fn-s15-continue" type="button">Watch it happen</button>';
    document.getElementById('fn-s15-continue').addEventListener('click', completeFunnel);
  }
  function completeFunnel(){
    track('funnel_completed', {
      style: chosenStyle,
      recall: quiz.recall,
      dream_types: quiz.dreamTypes,
      motivations: quiz.motivations
    });
    location.href = 'processing.html';
  }

  // ===================================================================
  // Navigation / phase engine
  // ===================================================================
  var SCREEN_RENDERERS = [renderScreenAdvChars, renderScreenAdvCamera, renderScreenAdvScenery, renderScreen11, renderScreen13, renderScreen14, renderScreen15];

  function renderProgress(){
    var dots = '';
    for(var i = 0; i < SCREEN_RENDERERS.length; i++){
      dots += '<i class="' + (i < cur ? 'done' : i === cur ? 'now' : '') + '"></i>';
    }
    progressEl.innerHTML = dots;
  }

  function applyPhase(stepIndex){
    var key = PHASE_BY_STEP[stepIndex];
    appEl.classList.toggle('fn-phase-night', key === 'night');
    var p = PHASES[key];
    appEl.style.background = p.grad;
    appEl.style.setProperty('--phase-ink', p.ink);
    appEl.style.setProperty('--phase-soft', p.soft);
    appEl.style.setProperty('--phase-faint', p.faint);
    appEl.style.setProperty('--phase-card', p.card);
    appEl.style.setProperty('--phase-line', p.line);
  }

  function render(){
    SCREEN_RENDERERS[cur](screenEl);
    applyPhase(cur);
    renderProgress();
    screenEl.scrollTop = 0;
    window.scrollTo(0, 0);
    track('funnel_step_viewed', { step: cur + 1, screen: TAGS[cur] });
  }

  function goToStep(n){
    if(n < 0 || n >= SCREEN_RENDERERS.length) return;
    cur = n;
    render();
  }
  function next(){ goToStep(cur + 1); }
  function prev(){
    if(cur > 0){ goToStep(cur - 1); return; }
    // The first screen here has nothing before it in this origin to step
    // back to — the visitor always arrives from the marketing funnel now,
    // so "back" should return them there. document.referrer confirms
    // that's genuinely where they came from before trusting history.back()
    // with it (same pattern as result.html's back button); falls back to
    // the funnel's URL directly if there's no referrer to check.
    if(document.referrer){ history.back(); return; }
    location.href = 'https://dreamtubeapp.netlify.app/';
  }
  backBtn.addEventListener('click', prev);

  // Make sure no stale draft from a previous/abandoned session leaks into
  // this one (mirrors create.html's own clean-slate behavior for
  // non-restore visits) — must run BEFORE the hydration below, not after,
  // otherwise it would wipe out the caption/style the visitor already
  // gave the marketing funnel.
  DreamStore.clearDraft();
  // The marketing funnel's screens 8 (dream capture) and 9 (style) used
  // to call DreamStore.setDraft() directly when they lived in this file
  // — now that they run in a different origin with no DreamStore at all,
  // the funnel carries their answers here as URL params instead, and
  // this is where they finally land in the real draft.
  DreamStore.setDraft({ caption: getParam('caption') || '', style: chosenStyle, sourceDreamId: null });
  render();
})();
</script>
</body>
</html>
