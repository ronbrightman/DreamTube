<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Explore — DreamTube</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/jpeg" href="assets/logo.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app" class="fill" style="position:relative;">
  <a class="explore-back" href="home.html">←</a>
  <div class="feed-scroll" id="feed-scroll"></div>
  <div class="toast" id="toast"></div>
</div>

<script src="js/store.js"></script>
<script>
  if(!DreamStore.getCurrentUser()){ location.href = 'login.html'; }

  function esc(str){ var d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
  function formatCount(n){ if(n>=1000) return (n/1000).toFixed(n%1000===0?0:1)+'k'; return String(n); }
  function getParam(name){ return new URLSearchParams(location.search).get(name); }

  function cardHTML(d, isFirst){
    var media = d.videoUrl
      ? '<video class="feed-video" src="'+esc(d.videoUrl)+'" autoplay muted loop playsinline></video>'
      : '<div class="feed-bg" style="background:'+DreamStore.gradientFor(d)+'"></div>';
    return '<div class="feed-card" data-id="'+d.id+'">' +
      media +
      '<div class="feed-scrim"></div>' +
      '<div class="feed-info">' +
        '<div class="feed-user">'+d.ownerHandle+'</div>' +
        '<div class="feed-caption" dir="auto">"'+esc(d.caption)+'"</div>' +
        '<span class="feed-tag">Style: '+d.style+'</span>' +
      '</div>' +
      '<div class="feed-actions">' +
        '<div class="feed-action'+(d.likedByMe?' liked':'')+'" data-like="'+d.id+'">' +
          '<div class="fa-circle">'+(d.likedByMe?'♥':'♡')+'</div><span data-count="'+d.id+'">'+formatCount(d.likes)+'</span>' +
        '</div>' +
        '<div class="feed-action" data-share="'+d.id+'"><div class="fa-circle">↗</div><span>Share</span></div>' +
      '</div>' +
      (isFirst ? '<div class="feed-swipe-hint">↕ SWIPE FOR NEXT DREAM</div>' : '') +
    '</div>';
  }

  var dreams = DreamStore.getFeed();
  var root = document.getElementById('feed-scroll');
  root.innerHTML = dreams.length
    ? dreams.map(function(d,i){ return cardHTML(d, i===0); }).join('')
    : '<div class="grid-empty" style="color:#fff;">No published dreams yet.</div>';

  Array.prototype.forEach.call(root.querySelectorAll('[data-like]'), function(el){
    el.addEventListener('click', function(){
      var d = DreamStore.toggleLike(el.dataset.like);
      if(!d) return;
      el.classList.toggle('liked', d.likedByMe);
      el.querySelector('.fa-circle').textContent = d.likedByMe ? '♥' : '♡';
      document.querySelector('[data-count="'+d.id+'"]').textContent = formatCount(d.likes);
    });
  });

  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }

  Array.prototype.forEach.call(root.querySelectorAll('[data-share]'), function(el){
    el.addEventListener('click', function(){
      var d = DreamStore.getDream(el.dataset.share);
      if(!d) return;
      var shareUrl = location.origin + '/explore.html?id=' + d.id;
      if(navigator.share){
        navigator.share({ title: 'DreamTube', text: 'Check out this dream: "' + d.caption + '"', url: shareUrl }).catch(function(){ /* user cancelled the share sheet */ });
      } else if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(shareUrl).then(function(){
          showToast('Link copied to clipboard');
        }).catch(function(){
          showToast("Couldn't copy link");
        });
      } else {
        showToast("Sharing isn't supported in this browser");
      }
    });
  });

  var targetId = getParam('id');
  if(targetId){
    var card = root.querySelector('.feed-card[data-id="'+targetId+'"]');
    if(card) card.scrollIntoView({ block: 'start' });
  }
</script>
</body>
</html>
