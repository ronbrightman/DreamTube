<body>
<div id="app" class="fill" style="position:relative;">
  <div class="gen-banner" id="gen-banner" style="display:none;">
    <div class="spinner-inline"></div>
    <div class="gen-banner-text">Your dream is still generating…</div>
  </div>
  <div class="explore-filter-chip" id="filter-chip" style="display:none;"></div>
  <div class="feed-scroll" id="feed-scroll"></div>
  <div class="toast" id="toast"></div>
  <div class="bottom-nav">
    <a class="nav-item active" href="explore.html"><div class="nav-icon icon"></div>Explore</a>
    <a class="nav-create" href="create.html" id="nav-create" title="Turn Your Dream Into a Video">+</a>
    <a class="nav-item" href="profile.html" id="nav-profile"><div class="nav-icon icon"></div>Profile</a>
  </div>

  <div class="modal-overlay" id="modal-signup-nudge">
    <div class="modal-card">
      <div class="modal-title">Turn your own dreams into videos</div>
      <div class="modal-body">Sign up free and describe (or record) a dream — DreamTube turns it into a video in minutes. Takes less than a minute to get started.</div>
      <div class="modal-row">
        <a class="btn btn-ghost" style="flex:1;" href="login.html" id="login-nudge-cta">Log in</a>
        <a class="btn btn-primary" style="flex:1;" href="login.html?mode=signup" id="signup-nudge-cta">Sign up</a>
      </div>
    </div>
  </div>
</div>

<script src="js/icons.js"></script>
<script src="js/store.js"></script>
<script>
  // Deliberately no login gate here, unlike every other page — Explore is
  // the real shared feed now (see js/store.js's getSharedFeed), and a
  // shared dream link needs to work for whoever opens it, logged in or not,
  // scrolling into the rest of the feed exactly like any other visitor.
  // Tapping +Create or Profile while logged out still needs an account
  // (those pages' own login gates would just bounce to a bare login screen
  // with no context), so intercept those taps here with a proper pitch for
  // signing up instead of a silent, unexplained redirect.
  var navIcons = document.querySelectorAll('.nav-icon');
  navIcons[0].innerHTML = Icons.compass;
  navIcons[1].innerHTML = Icons.person;

  var signupNudge = document.getElementById('modal-signup-nudge');
  var signupCta = document.getElementById('signup-nudge-cta');
  function gateNavLink(id, dest){
    document.getElementById(id).addEventListener('click', function(e){
      if(DreamStore.getCurrentUser()) return;
      e.preventDefault();
      // Carries through to login.html so signing up from here lands back
      // on whatever they were actually trying to do, not just Explore.
      signupCta.href = 'login.html?mode=signup&next=' + encodeURIComponent(dest);
      signupNudge.classList.add('open');
    });
  }
  gateNavLink('nav-create', 'create.html');
  gateNavLink('nav-profile', 'profile.html');
  signupNudge.addEventListener('click', function(e){
    if(e.target.id === 'modal-signup-nudge') signupNudge.classList.remove('open');
  });

  function esc(str){ var d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
  function formatCount(n){ if(n>=1000) return (n/1000).toFixed(n%1000===0?0:1)+'k'; return String(n); }
  function getParam(name){ return new URLSearchParams(location.search).get(name); }

  function cardHTML(d, isFirst, isDreamOfDay){
    // No autoplay attribute — every card would otherwise start playing the
    // instant it's inserted into the DOM regardless of whether it's the
    // visible one, so by the time you scrolled to card #2 it had already
    // been running in the background since page load. Playback is instead
    // driven entirely by the IntersectionObserver set up below, which only
    // plays whichever card is actually the current scroll-snap target and
    // restarts it from 0 every time it becomes active.
    var soundOn = DreamStore.getSoundPref();
    var media = d.videoUrl
      ? '<video class="feed-video" src="'+esc(d.videoUrl)+'"'+(soundOn?'':' muted')+' loop playsinline preload="metadata"></video>'
      : '<div class="feed-bg" style="background:'+DreamStore.gradientFor(d)+'"></div>';
    var muteBtn = d.videoUrl
      ? '<button class="icon-btn feed-mute-btn" data-mute="'+d.id+'" title="'+(soundOn?'Mute':'Unmute')+'" style="position:absolute; right:14px; top:calc(env(safe-area-inset-top,0px) + 16px); z-index:50; background:rgba(0,0,0,.5); border-color:rgba(255,255,255,.14);">'+(soundOn?Icons.volumeOn:Icons.volumeMuted)+'</button>'
      : '';
    // Manual recovery control for when autoplay doesn't kick in (blocked,
    // slow network, a decode/load error) — otherwise the card just sits on
    // a frozen frame forever with nothing to tap. See observeVideos() for
    // the play/pause listeners that keep this synced, and the click
    // handler below for the actual toggle.
    var playBadge = d.videoUrl
      ? '<div class="play-badge feed-play" data-play="'+d.id+'"><div class="badge-circle"><span class="icon">'+Icons.play+'</span></div></div>'
      : '';
    // Idea #3 — "Dream of the Day": not a separate page or section, just a
    // badge overlaid on whichever card the server picked as today's
    // highlight (see get-feed.js's resolveDreamOfDay — most-liked among
    // dreams that haven't already had a previous day's turn, same pick for
    // every visitor). Only shown in the unfiltered feed — a filtered view
    // (one style/user) is an intentional subset, not "the first thing
    // anyone sees."
    var dowBadge = isDreamOfDay
      ? '<div class="dow-badge"><div class="dow-eyebrow">Dream of the day</div><div class="dow-title" dir="auto">"'+esc(d.caption)+'"</div><div class="dow-sub">by '+esc(d.ownerHandle)+' · '+formatCount(d.likes)+' likes</div></div>'
      : '';
    return '<div class="feed-card" data-id="'+d.id+'">' +
      media +
      muteBtn +
      playBadge +
      dowBadge +
      '<div class="feed-scrim"></div>' +
      '<div class="feed-info">' +
        '<div class="feed-user-row"><div class="feed-avatar"></div><div class="feed-user" data-filter-user="'+esc(d.ownerHandle)+'">'+esc(d.ownerHandle)+'</div></div>' +
        '<div class="feed-caption clamped" dir="auto">'+esc(d.caption)+'</div>' +
        '<div class="feed-tag-row"><span data-filter-style="'+esc(d.style)+'">Style: '+esc(d.style)+'</span><span class="dot"></span><span>'+esc(d.dur)+'</span></div>' +
      '</div>' +
      '<div class="feed-actions">' +
        '<div class="feed-action'+(d.likedByMe?' liked':'')+'" data-like="'+d.id+'">' +
          '<div class="icon">'+(d.likedByMe?Icons.heartFilled:Icons.heartOutline)+'</div><span data-count="'+d.id+'">'+formatCount(d.likes)+'</span>' +
        '</div>' +
        '<div class="feed-action feed-action-disabled" title="Comments aren\'t available yet"><div class="icon">'+Icons.comment+'</div><span>0</span></div>' +
        '<div class="feed-action" data-share="'+d.id+'"><div class="icon">'+Icons.share+'</div><span>Share</span></div>' +
        '<div class="feed-action feed-action-disabled" title="Reposting isn\'t available yet"><div class="icon">'+Icons.repost+'</div><span>Repost</span></div>' +
      '</div>' +
      (isFirst ? '<div class="feed-swipe-hint">↕ SWIPE FOR NEXT DREAM</div>' : '') +
    '</div>';
  }

  var root = document.getElementById('feed-scroll');
  var chip = document.getElementById('filter-chip');
  var filter = null; // { type: 'style'|'user', value: string }

  // Fetched once from the real shared feed (see js/store.js's
  // getSharedFeed) and filtered client-side, rather than re-fetching per
  // filter click.
  var allDreams = [];
  var feedLoaded = false;
  var dreamOfDayId = null;

  function findLoadedDream(id){
    for(var i=0; i<allDreams.length; i++) if(allDreams[i].id === id) return allDreams[i];
    return null;
  }

  // Plays only the card that's actually the current scroll-snap target,
  // restarting it from 0 each time it becomes active, and pauses every
  // other card's video. threshold 0.6 picks a single "winner" during the
  // brief moment two cards are both partially visible mid-swipe, instead
  // of flickering between them. root is the scroll container itself
  // (.feed-scroll), not the window, since that's the actual scrolling
  // context for scroll-snap-type cards nested inside #app.
  var videoObserver = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      var video = entry.target;
      if(entry.isIntersecting && entry.intersectionRatio >= 0.6){
        if(video.paused){
          video.currentTime = 0;
          video.play().catch(function(){ /* autoplay can be blocked before any user gesture — muted should normally allow it regardless */ });
        }
      } else {
        video.pause();
      }
    });
  }, { root: root, threshold: [0, 0.6, 1] });

  // Switching away to a different tab/app doesn't change anything about
  // scroll position or intersection ratio, so the observer above has no
  // reason to pause anything on its own -- left alone, a video (and its
  // audio, if unmuted) just kept playing in the background tab, unlike
  // e.g. YouTube pausing when you tab away. Page Visibility API fixes
  // this directly: pause whichever card is actually playing when the tab
  // is hidden, and resume that same one (not just re-evaluate the
  // observer, which wouldn't fire again on its own here) when it's
  // visible again.
  var pausedByVisibility = null;
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){
      Array.prototype.forEach.call(root.querySelectorAll('.feed-video'), function(v){
        if(!v.paused){ v.pause(); pausedByVisibility = v; }
      });
    } else if(pausedByVisibility){
      if(root.contains(pausedByVisibility)) pausedByVisibility.play().catch(function(){});
      pausedByVisibility = null;
    }
  });

  // Keeps each card's play badge (see cardHTML) in sync with its video's
  // actual state, and gives a stalled video one chance to recover on its
  // own by reloading the source once on error, on top of the manual play
  // badge fallback (this is the primary content here, not a decorative
  // thumbnail, so unlike processing.html's preview row there's no gradient
  // to fall back to -- the badge is the recovery path).
  function wireVideoRecovery(v){
    var badge = v.closest('.feed-card').querySelector('.feed-play');
    if(badge){
      // 'play' fires the instant .play() is CALLED, not when playback
      // actually starts -- a video that's still buffering, or about to
      // fail with a network/decode error, fires 'play' immediately and
      // then never fires 'pause' to match (load()'s internal reset after
      // an error is silent, no event). Hiding on 'play' hid the only
      // recovery control exactly when it was needed most. 'playing' only
      // fires once real playback has actually begun.
      v.addEventListener('playing', function(){ badge.classList.add('hidden'); });
      v.addEventListener('pause', function(){ badge.classList.remove('hidden'); });
      v.addEventListener('error', function(){ badge.classList.remove('hidden'); });
    }
    // One retry only -- a permanently broken URL (not just a transient
    // network blip) would otherwise re-trigger 'error' immediately on every
    // retry and loop forever, hammering the network. After that, the play
    // badge above is the fallback: a real tap that calls play() again, not
    // an automatic retry loop.
    //
    // load() alone doesn't resume playback here -- unlike result.html/
    // processing.html, these videos deliberately have no autoplay
    // attribute (see cardHTML's comment: only the IntersectionObserver
    // above is allowed to start them, so a card never plays before it's
    // actually the visible one). Without an explicit play() after the
    // reload, a single transient error left the card sitting loaded-but-
    // paused indefinitely, since the observer only calls play() again when
    // the intersection ratio actually crosses a threshold -- which might
    // not happen again until the visitor scrolls away and back. This was a
    // real regression: it silently killed autoplay on any card that hit
    // so much as a momentary network hiccup.
    v.addEventListener('error', function(){
      if(v.dataset.retried) return;
      v.dataset.retried = '1';
      v.load();
      v.play().catch(function(){});
    });
  }

  function observeVideos(){
    videoObserver.disconnect();
    Array.prototype.forEach.call(root.querySelectorAll('.feed-video'), function(v){
      videoObserver.observe(v);
      wireVideoRecovery(v);
    });
  }

  function render(){
    if(!feedLoaded){
      root.innerHTML = '<div class="grid-empty" style="color:#fff;">Loading dreams…</div>';
      chip.style.display = 'none';
      return;
    }
    var dreams = allDreams;
    if(filter){
      dreams = dreams.filter(function(d){
        return filter.type === 'style' ? d.style === filter.value : d.ownerHandle === filter.value;
      });
    }
    root.innerHTML = dreams.length
      ? dreams.map(function(d,i){ return cardHTML(d, i===0, !filter && d.id === dreamOfDayId); }).join('')
      : '<div class="grid-empty" style="color:#fff;">' + (filter ? 'No dreams match this filter.' : 'No published dreams yet.') + '</div>';

    if(filter){
      chip.style.display = 'flex';
      chip.innerHTML = esc(filter.type === 'style' ? 'Style: ' + filter.value : filter.value) + ' <span class="fc-x">✕</span>';
    } else {
      chip.style.display = 'none';
    }

    observeVideos();
  }
  render();

  function loadFeed(){
    DreamStore.getSharedFeed().then(function(dreams){
      allDreams = dreams;
      // The pick itself is the server's job now (get-feed.js's
      // resolveDreamOfDay — same dream for every visitor on a given
      // calendar day, excluding ones that already had a previous day's
      // turn). This only decides whether THIS browser still needs the
      // pin-to-top + badge treatment for today's pick: without that check,
      // it'd get forced back to the top of the feed on every single visit
      // within the same day, not just the first. Once seen, it just sits
      // in its normal feed position like any other dream until tomorrow's
      // pick changes the id and the comparison trips again. See
      // DreamStore.getSeenDreamOfDayId/markDreamOfDaySeen.
      var dowId = DreamStore.getLastDreamOfDayId();
      var dow = dowId ? findLoadedDream(dowId) : null;
      if(dow && DreamStore.getSeenDreamOfDayId() !== dow.id){
        dreamOfDayId = dow.id;
        var idx = allDreams.indexOf(dow);
        if(idx > 0){ allDreams.splice(idx, 1); allDreams.unshift(dow); }
        DreamStore.markDreamOfDaySeen(dow.id);
      } else {
        dreamOfDayId = null;
      }
      feedLoaded = true;
      render();
      var targetId = getParam('id');
      if(targetId){
        var card = root.querySelector('.feed-card[data-id="'+targetId+'"]');
        if(card) card.scrollIntoView({ block: 'start' });
      }
    }).catch(function(){
      feedLoaded = true;
      root.innerHTML = '<div class="grid-empty" style="color:#fff;">Couldn\'t load the feed — check your connection and try again.</div>';
    });
  }
  loadFeed();

  // Picks back up a generation left running when the user navigated away
  // from Processing (browser back, closed tab, etc.) instead of waiting
  // for it to finish there — this used to live on the now-removed Home
  // page, ported here since Explore is the landing surface a resumed
  // generation would complete on now. Harmless no-op for a logged-out
  // visitor or anyone with nothing in flight (getPendingJob() is null).
  var pending = DreamStore.getPendingJob();
  if(pending){
    var banner = document.getElementById('gen-banner');
    banner.style.display = 'flex';
    DreamStore.resumePendingJob().then(function(){
      banner.style.display = 'none';
      loadFeed();
      showToast('Your dream is ready!');
    }).catch(function(){
      banner.style.display = 'none';
    });
  }

  chip.addEventListener('click', function(){
    filter = null;
    render();
  });

  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }

  // Delegated click handling so re-rendering (filtering) never needs to
  // re-attach per-card listeners.
  root.addEventListener('click', function(e){
    // A long caption used to grow unbounded and push into the video/
    // controls above it — same underlying issue as result.html's quote,
    // fixed the same way: clamp to 3 lines by default, tap to expand.
    var captionEl = e.target.closest('.feed-caption');
    if(captionEl){
      captionEl.classList.toggle('clamped');
      return;
    }
    var styleTag = e.target.closest('[data-filter-style]');
    if(styleTag){
      filter = { type: 'style', value: styleTag.dataset.filterStyle };
      render();
      return;
    }
    var userTag = e.target.closest('[data-filter-user]');
    if(userTag){
      filter = { type: 'user', value: userTag.dataset.filterUser };
      render();
      return;
    }
    var muteEl = e.target.closest('[data-mute]');
    if(muteEl){
      // Sound preference is global (not per-video), matching the standard
      // feed-app pattern — unmuting one card keeps the rest unmuted too,
      // including the ones you scroll to next. See DreamStore.setSoundPref.
      var soundOn = !DreamStore.getSoundPref();
      DreamStore.setSoundPref(soundOn);
      Array.prototype.forEach.call(root.querySelectorAll('.feed-video'), function(v){ v.muted = !soundOn; });
      Array.prototype.forEach.call(root.querySelectorAll('.feed-mute-btn'), function(btn){
        btn.innerHTML = soundOn ? Icons.volumeOn : Icons.volumeMuted;
        btn.title = soundOn ? 'Mute' : 'Unmute';
      });
      return;
    }
    // Tapping the video itself, or the play badge that sits on top of it
    // (see cardHTML/wireVideoRecovery), manually toggles playback -- the
    // fallback for whenever autoplay didn't actually start (blocked, slow
    // network, a load error) and the card would otherwise just be stuck.
    var videoEl = e.target.closest('.feed-video');
    var playEl = e.target.closest('[data-play]');
    if(videoEl || playEl){
      var vid = videoEl || playEl.closest('.feed-card').querySelector('.feed-video');
      if(vid){ vid.paused ? vid.play().catch(function(){}) : vid.pause(); }
      return;
    }
    var likeEl = e.target.closest('[data-like]');
    if(likeEl){
      var id = likeEl.dataset.like;
      var d = findLoadedDream(id);
      if(!d || likeEl.dataset.pending) return;
      var wasLiked = d.likedByMe;
      // Optimistic update — flip immediately, reconcile (or roll back) once
      // the real shared count comes back.
      likeEl.dataset.pending = '1';
      d.likedByMe = !wasLiked;
      d.likes += wasLiked ? -1 : 1;
      likeEl.classList.toggle('liked', d.likedByMe);
      likeEl.querySelector('.icon').innerHTML = d.likedByMe ? Icons.heartFilled : Icons.heartOutline;
      likeEl.querySelector('[data-count]').textContent = formatCount(d.likes);
      DreamStore.toggleSharedLike(id, wasLiked).then(function(result){
        d.likes = result.likes;
        d.likedByMe = result.likedByMe;
        delete likeEl.dataset.pending;
        likeEl.classList.toggle('liked', d.likedByMe);
        likeEl.querySelector('.icon').innerHTML = d.likedByMe ? Icons.heartFilled : Icons.heartOutline;
        likeEl.querySelector('[data-count]').textContent = formatCount(d.likes);
      }).catch(function(){
        // Roll back the optimistic flip.
        d.likedByMe = wasLiked;
        d.likes += wasLiked ? 1 : -1;
        delete likeEl.dataset.pending;
        likeEl.classList.toggle('liked', d.likedByMe);
        likeEl.querySelector('.icon').innerHTML = d.likedByMe ? Icons.heartFilled : Icons.heartOutline;
        likeEl.querySelector('[data-count]').textContent = formatCount(d.likes);
        showToast("Couldn't update like — try again.");
      });
      return;
    }
    var shareEl = e.target.closest('[data-share]');
    if(shareEl){
      var dream = findLoadedDream(shareEl.dataset.share);
      if(!dream) return;
      var shareUrl = location.origin + '/explore.html?id=' + dream.id;
      if(navigator.share){
        navigator.share({ title: 'DreamTube', text: 'Check out this dream: "' + dream.caption + '" — create your own on DreamTube!', url: shareUrl }).catch(function(){ /* user cancelled the share sheet */ });
      } else if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(shareUrl).then(function(){
          showToast('Link copied to clipboard');
        }).catch(function(){
          showToast("Couldn't copy link");
        });
      } else {
        showToast("Sharing isn't supported in this browser");
      }
    }
  });
</script>
</body>
</html>
