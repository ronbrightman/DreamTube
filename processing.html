<script src="js/analytics-config.js"></script>

  // renders when JS is off, so no JS-side check can stop it firing with a placeholder ID),
  // and this app requires JavaScript to function at all (js/store.js is the entire
  // client-side "backend"), so a no-JS visitor already has a non-functional app either
  // way. Add it back once META_PIXEL_ID is a real value, if desired:

</head>
<body>

<div id="app">
  <div class="proc-wrap">
    <div class="proc-live" id="proc-live">
      <div class="proc-orb"></div>
      <div class="proc-title">Turning your dream<br>into a video…</div>
      <div class="proc-sub" id="proc-sub">Video generation takes about 1-2 minutes.</div>
      <div class="proc-bar-track"><div class="proc-bar-fill" id="proc-fill"></div></div>
      <div class="proc-checklist" id="proc-checklist"></div>
      <div class="proc-preview" id="proc-preview" style="display:none;">
        <div class="proc-preview-label" id="proc-preview-label">While you wait, revisit your dreams</div>
        <div class="proc-preview-row" id="proc-preview-row"></div>
      </div>
    </div>
    <div class="proc-fail" id="proc-fail" style="display:none;">
      <div class="proc-fail-icon"></div>
      <div class="proc-title">That dream didn't<br>come through</div>
      <div class="proc-fail-copy">Something went wrong while generating your video. Your dream is saved — nothing is lost.</div>
      <div class="proc-fail-reason" id="proc-fail-reason" style="display:none;"></div>
      <div class="proc-fail-code" id="proc-fail-code"></div>
      <div style="width:100%; display:flex; flex-direction:column; gap:10px; padding:0 6px;">
        <button class="btn btn-primary btn-block" id="retry-btn">Try Again</button>
        <button class="btn btn-ghost btn-block" id="fail-edit-btn">Edit Dream</button>
      </div>
    </div>
  </div>

</div>

<script src="js/icons.js"></script>
<script src="js/store.js"></script>
<script>
  if(!DreamStore.getCurrentUser()){ location.href = 'login.html'; }
  document.querySelector('.proc-fail-icon').innerHTML = Icons.warning;
  var draft = DreamStore.getDraft();
  if(!DreamStore.getPendingJob() && (!draft.caption || !draft.style)){ location.href = 'create.html'; }

  var CAPTIONS = ['Painting the scene…', 'Rendering the light…', 'Adding motion…', 'Composing the soundtrack…', 'Polishing details…', 'Almost dreaming…'];
  var progInterval;

  // Real Veo generation takes minutes, not seconds, and there's no real
  // percentage to report — the bar itself is a purely indeterminate CSS
  // sweep (see .proc-bar-fill/.proc-bar-sweep in css/styles.css), and this
  // renders the same CAPTIONS list as a growing checklist instead of a
  // single rotating line: everything before the current step gets a
  // checkmark and stays on screen, the current step gets a small spinner.
  // Once the list itself runs out (generation takes longer than 6 ticks),
  // the last two steps alternate being "current" forever rather than
  // resetting back to step 1 — so it keeps visibly moving no matter how
  // long the real call takes.
  function renderChecklist(currentIdx, maxReached){
    var html = '';
    for(var i = 0; i <= maxReached; i++){
      if(i === currentIdx){
        html += '<div class="proc-check-item current"><span class="spinner-inline"></span><span class="proc-check-label">' + CAPTIONS[i] + '</span></div>';
      } else {
        html += '<div class="proc-check-item done"><span class="proc-check-mark">' + Icons.check + '</span><span class="proc-check-label">' + CAPTIONS[i] + '</span></div>';
      }
    }
    document.getElementById('proc-checklist').innerHTML = html;
  }
  function startFakeProgress(){
    var tickCount = 0, maxReached = 0;
    clearInterval(progInterval);
    renderChecklist(0, 0);
    progInterval = setInterval(function(){
      tickCount++;
      var currentIdx;
      if(tickCount < CAPTIONS.length){
        currentIdx = tickCount;
      } else {
        var overflow = tickCount - CAPTIONS.length;
        var lastTwo = [CAPTIONS.length - 2, CAPTIONS.length - 1];
        currentIdx = lastTwo[overflow % 2];
      }
      maxReached = Math.max(maxReached, currentIdx);
      renderChecklist(currentIdx, maxReached);
    }, 5000);
  }
  function finishProgress(){
    clearInterval(progInterval);
  }

  function previewThumbHTML(d){
    var media = d.videoUrl
      ? '<video class="ppt-bg" src="'+d.videoUrl+'" muted loop playsinline autoplay preload="metadata"></video>'
      : '<div class="ppt-bg" style="background:'+DreamStore.gradientFor(d)+'"></div>';
    return '<div class="proc-preview-thumb">'+media+'</div>';
  }

  // These are decorative background loops (no play/pause control makes
  // sense on a 64px thumbnail) -- so instead of a control to recover a
  // stalled video, a load/decode error just swaps it for the same gradient
  // fallback already used when there's no videoUrl at all, rather than
  // leaving a frozen/broken video sitting there while waiting.
  function wirePreviewErrorFallback(row, dreams){
    Array.prototype.forEach.call(row.querySelectorAll('.ppt-bg'), function(el, i){
      if(el.tagName !== 'VIDEO') return;
      el.addEventListener('error', function(){
        var bg = document.createElement('div');
        bg.className = 'ppt-bg';
        bg.style.background = DreamStore.gradientFor(dreams[i]);
        el.replaceWith(bg);
      });
    });
  }

  // A brand-new user has no dreams of their own yet, so this section used
  // to just hide itself entirely while they wait — showing nothing where
  // there's screen real estate to fill. Falls back to the general shared
  // Explore feed in that case instead, same visual treatment either way.
  function renderPreview(){
    var section = document.getElementById('proc-preview');
    var row = document.getElementById('proc-preview-row');
    var label = document.getElementById('proc-preview-label');
    var mine = DreamStore.getMyDreams().filter(function(d){ return d.isPublished; }).slice(0, 10);
    if(mine.length){
      section.style.display = 'block';
      label.textContent = 'While you wait, revisit your dreams';
      row.innerHTML = mine.map(previewThumbHTML).join('');
      wirePreviewErrorFallback(row, mine);
      return;
    }
    DreamStore.getSharedFeed().then(function(dreams){
      var pick = dreams.slice(0, 10);
      if(!pick.length){ section.style.display = 'none'; return; }
      section.style.display = 'block';
      label.textContent = 'While you wait, explore other dreams';
      row.innerHTML = pick.map(previewThumbHTML).join('');
      wirePreviewErrorFallback(row, pick);
    }).catch(function(){ section.style.display = 'none'; });
  }

  // ===== Insufficient-tokens fail-state (E112) =====
  // retry-btn normally just re-runs generation, but an E112 failure means
  // an immediate retry would fail identically (the account genuinely
  // doesn't have the 100 tokens a generation costs) — see generate-video.js's
  // E112 doc block. tokenFailContext tracks whether the *current* fail
  // screen is that case, so retry-btn's single listener below can dispatch
  // to the right action without needing to add/remove listeners on every
  // run.
  var retryBtn = document.getElementById('retry-btn');
  var tokenFailContext = false;

  function runGeneration(){
    document.getElementById('proc-live').style.display = 'flex';
    document.getElementById('proc-fail').style.display = 'none';
    tokenFailContext = false;
    retryBtn.textContent = 'Try Again';
    startFakeProgress();
    renderPreview();

    var pending = DreamStore.getPendingJob();
    var task;
    if(pending){
      task = DreamStore.resumePendingJob();
    } else {
      var d = DreamStore.getDraft();
      var advancedOpts = { characterIds: d.characterIds, cameraView: d.cameraView, sceneryTime: d.sceneryTime, sceneryPlace: d.sceneryPlace };
      task = d.sourceDreamId
        ? DreamStore.regenerateDream(d.sourceDreamId, Object.assign({ caption: d.caption, style: d.style }, advancedOpts))
        : DreamStore.generateVideo(d.caption, d.style, advancedOpts);
    }

    task.then(function(dream){
      finishProgress();
      setTimeout(function(){
        DreamStore.clearDraft();
        location.href = 'result.html?id=' + dream.id;
      }, 350);
    }).catch(function(err){
      clearInterval(progInterval);
      document.getElementById('proc-live').style.display = 'none';
      document.getElementById('proc-fail').style.display = 'flex';
      // err.message carries an "ENNN: reason" string from wherever it
      // actually failed (submission, polling, or a client-side
      // timeout/network drop — see js/store.js, generate-video.js,
      // video-status.js). Split the code from the reason so a full
      // human-readable explanation (e.g. a content-policy rejection) reads
      // as a sentence, with the code itself kept small underneath purely
      // for support reference — not the whole thing crammed into one tiny
      // monospace chip.
      var raw = (err && err.message) || 'E399: unknown_error';
      var match = /^([A-Z]\d+):\s*([\s\S]*)$/.exec(raw);
      var reasonEl = document.getElementById('proc-fail-reason');
      if(match && match[2]){
        document.getElementById('proc-fail-code').textContent = match[1];
        reasonEl.textContent = match[2];
        reasonEl.style.display = 'block';
      } else {
        document.getElementById('proc-fail-code').textContent = raw;
        reasonEl.style.display = 'none';
      }
      // E112 specifically: an immediate retry would just fail the same way
      // again (see the doc block above), so retry-btn's label/behavior
      // swaps to navigating to the token shop instead of re-running
      // generation — same pattern the old E111 handling used, just pointing
      // at shop.html instead of an inline top-up sheet (there's no
      // backend purchase call yet, see shop.html's own header comment).
      if(match && match[1] === 'E112'){
        tokenFailContext = true;
        retryBtn.textContent = 'Get more tokens';
      }
    });
  }

  retryBtn.addEventListener('click', function(){
    if(tokenFailContext){ location.href = 'shop.html'; return; }
    runGeneration();
  });
  document.getElementById('fail-edit-btn').addEventListener('click', function(){
    DreamStore.setDraft({ restore: true });
    location.href = 'create.html';
  });

  runGeneration();
</script>
</body>
</html>
