<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Generating… — DreamTube</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/logo-v2.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">
  <div class="proc-wrap">
    <div class="proc-live" id="proc-live">
      <div class="proc-orb"></div>
      <div class="proc-title">Turning your dream<br>into a video…</div>
      <div class="proc-sub" id="proc-sub">Real video generation takes 1–6 minutes.</div>
      <div class="proc-bar-track"><div class="proc-bar-fill" id="proc-fill"></div></div>
      <div class="proc-pct" id="proc-pct">0%</div>
      <div class="proc-caption" id="proc-caption">Painting the scene…</div>
      <button class="btn btn-ghost" id="notify-btn" disabled style="margin-top:6px;"></button>
      <div class="proc-preview" id="proc-preview" style="display:none;">
        <div class="proc-preview-label">While you wait, revisit your dreams</div>
        <div class="proc-preview-row" id="proc-preview-row"></div>
      </div>
    </div>
    <div class="proc-fail" id="proc-fail" style="display:none;">
      <div class="proc-fail-icon"></div>
      <div class="proc-title">That dream didn't<br>come through</div>
      <div class="proc-fail-copy">Something went wrong while generating your video. Your dream is saved — nothing is lost.</div>
      <div class="proc-fail-code" id="proc-fail-code"></div>
      <div style="width:100%; display:flex; flex-direction:column; gap:10px; padding:0 6px;">
        <button class="btn btn-primary btn-block" id="retry-btn">Try Again</button>
        <button class="btn btn-ghost btn-block" id="fail-edit-btn">Edit Dream</button>
      </div>
    </div>
  </div>
</div>

<script src="js/icons.js"></script>
<script src="js/store.js"></script>
<script>
  if(!DreamStore.getCurrentUser()){ location.href = 'login.html'; }
  document.querySelector('.proc-fail-icon').innerHTML = Icons.warning;
  // Disabled: real push notifications need a service worker + a push
  // subscription backend, neither of which this app has. The old handler
  // just requested in-page Notification permission and hoped the tab
  // stayed open and unsuspended long enough to fire one — not something
  // to promise the user, so the button stays visible but inert until
  // there's a real implementation behind it.
  document.getElementById('notify-btn').innerHTML = '<span class="icon" style="width:14px;height:14px;">' + Icons.bell + '</span> Notifications coming soon';
  var draft = DreamStore.getDraft();
  if(!DreamStore.getPendingJob() && (!draft.caption || !draft.style)){ location.href = 'create.html'; }

  var CAPTIONS = ['Painting the scene…', 'Rendering the light…', 'Adding motion…', 'Composing the soundtrack…', 'Polishing details…', 'Almost dreaming…'];
  var progInterval;

  // Real Veo generation takes minutes, not seconds — this bar just creeps
  // toward 92% over roughly the same timespan as MAX_POLL_MS in store.js.
  function startFakeProgress(){
    var pct = 0, capIdx = 0;
    document.getElementById('proc-fill').style.width = '0%';
    document.getElementById('proc-pct').textContent = '0%';
    document.getElementById('proc-caption').textContent = CAPTIONS[0];
    clearInterval(progInterval);
    progInterval = setInterval(function(){
      pct = Math.min(pct + Math.random()*1.6 + 0.6, 92);
      document.getElementById('proc-fill').style.width = pct + '%';
      document.getElementById('proc-pct').textContent = Math.floor(pct) + '%';
      capIdx = (capIdx + 1) % CAPTIONS.length;
      document.getElementById('proc-caption').textContent = CAPTIONS[capIdx];
    }, 5000);
  }
  function finishProgress(){
    clearInterval(progInterval);
    document.getElementById('proc-fill').style.width = '100%';
    document.getElementById('proc-pct').textContent = '100%';
  }

  function renderPreview(){
    var seen = {};
    var dreams = DreamStore.getMyDreams().concat(DreamStore.getFeed()).filter(function(d){
      if(seen[d.id]) return false;
      seen[d.id] = true;
      return true;
    }).slice(0, 10);
    var section = document.getElementById('proc-preview');
    var row = document.getElementById('proc-preview-row');
    if(!dreams.length){ section.style.display = 'none'; return; }
    section.style.display = 'block';
    row.innerHTML = dreams.map(function(d){
      var media = d.videoUrl
        ? '<video class="ppt-bg" src="'+d.videoUrl+'" muted loop playsinline autoplay preload="metadata"></video>'
        : '<div class="ppt-bg" style="background:'+DreamStore.gradientFor(d)+'"></div>';
      return '<div class="proc-preview-thumb">'+media+'</div>';
    }).join('');
  }

  function runGeneration(){
    document.getElementById('proc-live').style.display = 'flex';
    document.getElementById('proc-fail').style.display = 'none';
    startFakeProgress();
    renderPreview();

    var pending = DreamStore.getPendingJob();
    var task;
    if(pending){
      task = DreamStore.resumePendingJob();
    } else {
      var d = DreamStore.getDraft();
      var advancedOpts = { characterIds: d.characterIds, cameraView: d.cameraView, sceneryTime: d.sceneryTime, sceneryPlace: d.sceneryPlace };
      task = d.sourceDreamId
        ? DreamStore.regenerateDream(d.sourceDreamId, Object.assign({ caption: d.caption, style: d.style }, advancedOpts))
        : DreamStore.generateVideo(d.caption, d.style, advancedOpts);
    }

    task.then(function(dream){
      finishProgress();
      setTimeout(function(){
        DreamStore.clearDraft();
        location.href = 'result.html?id=' + dream.id;
      }, 350);
    }).catch(function(err){
      clearInterval(progInterval);
      document.getElementById('proc-live').style.display = 'none';
      document.getElementById('proc-fail').style.display = 'flex';
      // err.message already carries an ENNN code from wherever it actually
      // failed (submission, polling, or a client-side timeout/network drop
      // — see js/store.js, generate-video.js, video-status.js) so it's
      // shown as-is rather than re-summarized into something generic.
      document.getElementById('proc-fail-code').textContent = (err && err.message) || 'E399: unknown_error';
    });
  }

  document.getElementById('retry-btn').addEventListener('click', runGeneration);
  document.getElementById('fail-edit-btn').addEventListener('click', function(){
    DreamStore.setDraft({ restore: true });
    location.href = 'create.html';
  });

  runGeneration();
</script>
</body>
</html>
