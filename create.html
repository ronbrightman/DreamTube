<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>New Dream — DreamTube</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/logo-v2.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">
  <div class="topbar"><div class="icon-btn" id="create-back"></div><div style="font-weight:700; font-size:14px;" id="create-heading">New Dream</div><div style="width:36px;"></div></div>

  <div class="px" id="create-select" style="flex:1; padding-top:6px;">
    <div class="section-label" style="margin-top:10px;">Describe a dream</div>
    <div class="choice-card" id="choice-write">
      <div class="choice-icon choice-icon-write"></div>
      <div class="choice-text"><div class="choice-title">Write it</div><div class="choice-sub">Type out your dream</div></div>
      <div class="choice-chevron">›</div>
    </div>
    <div class="choice-card" id="choice-record">
      <div class="choice-icon choice-icon-record"></div>
      <div class="choice-text"><div class="choice-title">Record it</div><div class="choice-sub">Speak your dream out loud</div></div>
      <div class="choice-chevron">›</div>
    </div>
    <div class="rec-error" id="select-error" style="display:none;"></div>
  </div>

  <div class="px" id="create-write" style="flex:1; display:none; flex-direction:column; padding-top:10px; overflow-y:auto;">
    <textarea class="field" id="dream-text" dir="auto" placeholder="I was flying over a city made of glass..."></textarea>
    <div class="char-count" id="char-count">0 characters</div>

    <div class="adv-section" id="adv-section">
      <div class="adv-toggle" id="adv-toggle">
        <span>Advanced</span>
        <span class="icon" id="adv-chevron"></span>
      </div>
      <div class="adv-content">
        <div class="adv-sub-label">Characters</div>
        <div class="adv-hint">Define people in your dream once, reuse them anytime.</div>
        <div class="char-chip-row" id="char-chip-row" style="margin-top:10px;"></div>
      </div>
    </div>

    <div style="flex:1; min-height:16px;"></div>
    <button class="btn btn-primary btn-block" id="write-continue" disabled style="margin-bottom:22px;">Continue</button>
  </div>

  <div class="px rec-panel" id="create-record" style="display:none;">
    <div class="rec-timer" id="rec-timer">00:00</div>
    <div class="rec-dot"></div>
    <div class="wave"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div style="font-size:12px; color:var(--text-muted);">Speak naturally — we'll transcribe it</div>
    <div style="width:100%; padding:0 4px 22px;">
      <button class="btn btn-primary btn-block" id="stop-record">Stop Recording</button>
    </div>
  </div>

  <div class="px rec-panel" id="create-review" style="display:none;">
    <div class="rec-timer" id="review-timer">00:00</div>
    <div class="wave static" id="review-wave">
      <span style="height:14px;"></span><span style="height:26px;"></span><span style="height:10px;"></span><span style="height:30px;"></span>
      <span style="height:18px;"></span><span style="height:8px;"></span><span style="height:24px;"></span><span style="height:16px;"></span>
    </div>
    <button class="btn btn-secondary" id="play-btn"></button>
    <div class="rec-error" id="rec-error" style="display:none;"></div>
    <div style="flex:1"></div>
    <div style="width:100%; display:flex; flex-direction:column; gap:10px; padding:0 4px 22px;">
      <button class="btn btn-primary btn-block" id="review-continue">Continue</button>
      <button class="btn btn-ghost btn-block" id="re-record"></button>
    </div>
  </div>

  <div class="sheet-overlay" id="sheet-character-overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="char-sheet-title">Add a character</div>
      <input class="field" id="char-name-input" placeholder="Name (e.g. Mom, my friend Alex)" dir="auto">
      <textarea class="field" id="char-desc-input" placeholder="Describe how they look..." dir="auto" style="min-height:90px;"></textarea>
      <div class="err-text" id="char-error"></div>
      <button class="btn btn-primary btn-block" id="char-save-btn">Save</button>
      <div style="height:10px;"></div>
      <span class="link-text" id="char-cancel" style="cursor:pointer;">Cancel</span>
      <div style="height:8px;"></div>
      <span class="link-text" id="char-delete-link" style="cursor:pointer; color:var(--danger); display:none;">Delete this character</span>
    </div>
  </div>
</div>

<script src="js/icons.js"></script>
<script src="js/store.js"></script>
<script>
  if(!DreamStore.getCurrentUser()){ location.href = 'login.html'; }

  document.getElementById('create-back').innerHTML = Icons.back;
  document.querySelector('.choice-icon-write').innerHTML = Icons.pencil;
  document.querySelector('.choice-icon-record').innerHTML = Icons.mic;
  document.querySelector('.rec-dot').innerHTML = Icons.mic;
  document.getElementById('re-record').innerHTML = '<span class="icon" style="width:14px;height:14px;">' + Icons.redo + '</span> Re-record';
  document.getElementById('adv-chevron').innerHTML = Icons.chevronDown;

  // ===== Advanced: characters =====
  document.getElementById('adv-toggle').addEventListener('click', function(){
    document.getElementById('adv-section').classList.toggle('open');
  });

  function esc(str){ var d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

  function charChipHTML(c, selected){
    return '<div class="char-chip'+(selected?' selected':'')+'" data-char-select="'+c.id+'">' +
      '<span class="chip-check"><span class="icon">'+Icons.check+'</span></span>' +
      '<span data-char-edit="'+c.id+'">'+esc(c.name)+'</span>' +
      '<span class="chip-edit icon" data-char-edit="'+c.id+'">'+Icons.pencil+'</span>' +
    '</div>';
  }

  function renderCharacterChips(){
    var row = document.getElementById('char-chip-row');
    if(!row) return;
    var characters = DreamStore.getCharacters();
    var selectedIds = DreamStore.getDraft().characterIds || [];
    var hasSelf = characters.some(function(c){ return c.isSelf; });
    var html = characters.map(function(c){ return charChipHTML(c, selectedIds.indexOf(c.id) !== -1); }).join('');
    if(!hasSelf){
      html += '<div class="char-chip-add" id="char-add-self"><span class="icon">'+Icons.userPlus+'</span> Add yourself</div>';
    }
    html += '<div class="char-chip-add" id="char-add-other"><span class="icon">'+Icons.plus+'</span> Add a character</div>';
    row.innerHTML = html;

    var addSelfBtn = document.getElementById('char-add-self');
    if(addSelfBtn) addSelfBtn.addEventListener('click', function(){ openCharSheet('self', null); });
    document.getElementById('char-add-other').addEventListener('click', function(){ openCharSheet('other', null); });
  }

  document.getElementById('char-chip-row').addEventListener('click', function(e){
    var editTarget = e.target.closest('[data-char-edit]');
    if(editTarget){
      var c = DreamStore.getCharacters().filter(function(x){ return x.id === editTarget.dataset.charEdit; })[0];
      if(c) openCharSheet(c.isSelf ? 'self' : 'other', c);
      return;
    }
    var chip = e.target.closest('[data-char-select]');
    if(!chip) return;
    var id = chip.dataset.charSelect;
    var selectedIds = (DreamStore.getDraft().characterIds || []).slice();
    var idx = selectedIds.indexOf(id);
    if(idx === -1) selectedIds.push(id); else selectedIds.splice(idx, 1);
    DreamStore.setDraft({ characterIds: selectedIds });
    renderCharacterChips();
  });

  var charEditingId = null;
  function openCharSheet(mode, existing){
    charEditingId = existing ? existing.id : null;
    document.getElementById('char-sheet-title').textContent = mode === 'self'
      ? (existing ? 'Edit yourself' : 'Add yourself')
      : (existing ? 'Edit character' : 'Add a character');
    var nameInput = document.getElementById('char-name-input');
    nameInput.style.display = mode === 'self' ? 'none' : 'block';
    nameInput.value = existing ? existing.name : '';
    document.getElementById('char-desc-input').value = existing ? existing.description : '';
    document.getElementById('char-desc-input').dataset.mode = mode;
    document.getElementById('char-error').textContent = '';
    document.getElementById('char-delete-link').style.display = existing ? 'block' : 'none';
    document.getElementById('sheet-character-overlay').classList.add('open');
  }
  function closeCharSheet(){
    document.getElementById('sheet-character-overlay').classList.remove('open');
  }
  document.getElementById('char-cancel').addEventListener('click', closeCharSheet);
  document.getElementById('sheet-character-overlay').addEventListener('click', function(e){
    if(e.target.id === 'sheet-character-overlay') closeCharSheet();
  });
  document.getElementById('char-save-btn').addEventListener('click', function(){
    var mode = document.getElementById('char-desc-input').dataset.mode;
    var result = DreamStore.saveCharacter({
      id: charEditingId,
      isSelf: mode === 'self',
      name: document.getElementById('char-name-input').value,
      description: document.getElementById('char-desc-input').value
    });
    if(!result.ok){
      document.getElementById('char-error').textContent = result.error;
      return;
    }
    if(mode !== 'self'){
      var selectedIds = (DreamStore.getDraft().characterIds || []).slice();
      if(selectedIds.indexOf(result.character.id) === -1){ selectedIds.push(result.character.id); DreamStore.setDraft({ characterIds: selectedIds }); }
    }
    closeCharSheet();
    renderCharacterChips();
  });
  document.getElementById('char-delete-link').addEventListener('click', function(){
    if(!charEditingId) return;
    if(!confirm('Delete this character?')) return;
    DreamStore.deleteCharacter(charEditingId);
    var selectedIds = (DreamStore.getDraft().characterIds || []).filter(function(id){ return id !== charEditingId; });
    DreamStore.setDraft({ characterIds: selectedIds });
    closeCharSheet();
    renderCharacterChips();
  });

  function playBtnLabel(playing){
    return '<span class="icon" style="width:14px;height:14px;">' + (playing ? Icons.pause : Icons.play) + '</span> ' + (playing ? 'Playing…' : 'Play back');
  }
  document.getElementById('play-btn').innerHTML = playBtnLabel(false);

  // If we arrived here from a failed generation, restore the draft text.
  // Otherwise start clean — don't let a stale abandoned draft leak into a fresh session.
  var draft = DreamStore.getDraft();
  if(!draft.restore){
    DreamStore.clearDraft();
    draft = DreamStore.getDraft();
  }
  var recInterval;
  var mediaStream = null;
  var mediaRecorder = null;
  var recordedChunks = [];
  var recordedBlob = null;
  var recordedMimeType = '';
  var playbackAudio = new Audio();
  var playbackObjectUrl = null;

  var selectEl = document.getElementById('create-select');
  var writeEl = document.getElementById('create-write');
  var recordEl = document.getElementById('create-record');
  var reviewEl = document.getElementById('create-review');
  var heading = document.getElementById('create-heading');
  var textArea = document.getElementById('dream-text');
  var charCount = document.getElementById('char-count');
  var writeContinue = document.getElementById('write-continue');
  var reviewContinue = document.getElementById('review-continue');

  function showError(elId, msg){
    var el = document.getElementById(elId);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError(elId){
    document.getElementById(elId).style.display = 'none';
  }

  function stopMediaStream(){
    if(mediaStream){ mediaStream.getTracks().forEach(function(t){ t.stop(); }); mediaStream = null; }
  }

  function pickMimeType(){
    var candidates = ['audio/ogg;codecs=opus', 'audio/mp4', 'audio/wav', 'audio/webm;codecs=opus', 'audio/webm'];
    for(var i=0; i<candidates.length; i++){
      if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(candidates[i])) return candidates[i];
    }
    return '';
  }

  function updateCharCount(){
    var n = textArea.value.length;
    charCount.textContent = n + ' character' + (n===1?'':'s');
    writeContinue.disabled = n < 8;
  }
  textArea.addEventListener('input', updateCharCount);

  document.getElementById('choice-write').addEventListener('click', function(){
    selectEl.style.display = 'none';
    writeEl.style.display = 'flex';
    heading.textContent = 'Write your dream';
    textArea.focus();
  });

  function startRecordingUI(){
    hideError('select-error');
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder){
      showError('select-error', "Recording isn't supported in this browser — try Write instead.");
      return;
    }
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream){
      mediaStream = stream;
      recordedChunks = [];
      var mimeType = pickMimeType();
      mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType: mimeType }) : new MediaRecorder(stream);
      recordedMimeType = mediaRecorder.mimeType || mimeType || 'audio/webm';
      mediaRecorder.addEventListener('dataavailable', function(e){
        if(e.data && e.data.size > 0) recordedChunks.push(e.data);
      });
      mediaRecorder.start();

      selectEl.style.display = 'none';
      reviewEl.style.display = 'none';
      recordEl.style.display = 'flex';
      heading.textContent = 'Record your dream';
      var secs = 0;
      document.getElementById('rec-timer').textContent = '00:00';
      clearInterval(recInterval);
      recInterval = setInterval(function(){
        secs++;
        var m = String(Math.floor(secs/60)).padStart(2,'0');
        var s = String(secs%60).padStart(2,'0');
        document.getElementById('rec-timer').textContent = m+':'+s;
      }, 1000);
    }).catch(function(){
      showError('select-error', 'Microphone access was denied — allow it in your browser settings, or use Write instead.');
    });
  }
  document.getElementById('choice-record').addEventListener('click', startRecordingUI);

  document.getElementById('create-back').addEventListener('click', function(){
    var open = [writeEl, recordEl, reviewEl].some(function(el){ return el.style.display === 'flex'; });
    if(open){
      selectEl.style.display = 'block';
      writeEl.style.display = 'none';
      recordEl.style.display = 'none';
      reviewEl.style.display = 'none';
      heading.textContent = 'New Dream';
      clearInterval(recInterval);
      stopMediaStream();
      playbackAudio.pause();
    } else {
      location.href = 'home.html';
    }
  });

  writeContinue.addEventListener('click', function(){
    DreamStore.setDraft({ caption: textArea.value.trim(), sourceDreamId: null });
    location.href = 'style.html';
  });

  document.getElementById('stop-record').addEventListener('click', function(){
    clearInterval(recInterval);
    if(!mediaRecorder || mediaRecorder.state === 'inactive'){ return; }
    mediaRecorder.addEventListener('stop', function(){
      stopMediaStream();
      recordedBlob = new Blob(recordedChunks, { type: recordedMimeType });
      if(playbackObjectUrl) URL.revokeObjectURL(playbackObjectUrl);
      playbackObjectUrl = URL.createObjectURL(recordedBlob);
      playbackAudio.src = playbackObjectUrl;

      recordEl.style.display = 'none';
      document.getElementById('review-timer').textContent = document.getElementById('rec-timer').textContent;
      hideError('rec-error');
      reviewContinue.disabled = false;
      reviewContinue.textContent = 'Continue';
      reviewEl.style.display = 'flex';
      heading.textContent = 'Review your recording';
    }, { once: true });
    mediaRecorder.stop();
  });
  document.getElementById('re-record').addEventListener('click', function(){
    playbackAudio.pause();
    startRecordingUI();
  });
  document.getElementById('play-btn').addEventListener('click', function(){
    var btn = document.getElementById('play-btn');
    if(!recordedBlob) return;
    if(!playbackAudio.paused){
      playbackAudio.pause();
      return;
    }
    playbackAudio.play();
  });
  playbackAudio.addEventListener('play', function(){
    document.getElementById('play-btn').innerHTML = playBtnLabel(true);
  });
  playbackAudio.addEventListener('pause', function(){
    document.getElementById('play-btn').innerHTML = playBtnLabel(false);
  });
  playbackAudio.addEventListener('ended', function(){
    document.getElementById('play-btn').innerHTML = playBtnLabel(false);
  });

  function bufferToBase64(buffer){
    var bytes = new Uint8Array(buffer);
    var binary = '';
    for(var i=0; i<bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }

  var TRANSCRIBE_POLL_MS = 2500;
  var TRANSCRIBE_MAX_MS = 90 * 1000;

  // The submission itself is fast (just queues the job with fal.ai); actual
  // transcription time varies with fal's queue load, so this polls
  // transcribe-status.js rather than waiting on one long request — a single
  // blocking call previously hit Netlify's own gateway timeout on real
  // (longer-queued) recordings even though the transcription itself
  // typically finishes in under a second once a worker picks it up.
  function pollTranscribeStatus(operationName, startedAt){
    return new Promise(function(resolve, reject){
      function poll(){
        if(Date.now() - startedAt > TRANSCRIBE_MAX_MS){ reject(new Error('transcription_timeout')); return; }
        fetch('/.netlify/functions/transcribe-status?name=' + encodeURIComponent(operationName))
          .then(function(res){ return res.json(); })
          .then(function(data){
            if(data.error){ reject(new Error(data.error)); return; }
            if(data.done){ resolve(data.transcript); return; }
            setTimeout(poll, TRANSCRIBE_POLL_MS);
          })
          .catch(reject);
      }
      poll();
    });
  }

  reviewContinue.addEventListener('click', function(){
    if(!recordedBlob) return;
    hideError('rec-error');
    reviewContinue.disabled = true;
    reviewContinue.textContent = 'Transcribing…';

    recordedBlob.arrayBuffer().then(function(buffer){
      return fetch('/.netlify/functions/transcribe-audio', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ audio: bufferToBase64(buffer), mimeType: recordedMimeType.split(';')[0] })
      });
    }).then(function(res){
      return res.json().then(function(data){ return { ok: res.ok, data: data }; });
    }).then(function(result){
      if(!result.ok || result.data.error || !result.data.operationName){
        throw new Error((result.data && result.data.error) || 'transcription_failed');
      }
      return pollTranscribeStatus(result.data.operationName, Date.now());
    }).then(function(transcript){
      DreamStore.setDraft({ caption: transcript, sourceDreamId: null });
      location.href = 'style.html';
    }).catch(function(){
      reviewContinue.disabled = false;
      reviewContinue.textContent = 'Continue';
      showError('rec-error', "Couldn't transcribe that recording — try again, or re-record.");
    });
  });

  renderCharacterChips();

  // If arriving with a restore flag (from a failed generation), pre-fill Write mode.
  if(draft && draft.restore && draft.caption){
    document.getElementById('choice-write').click();
    textArea.value = draft.caption;
    updateCharCount();
    DreamStore.setDraft({ restore: false });
  }
</script>
</body>
</html>
